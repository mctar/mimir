<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mímir — Vue facilitateur</title>
<link rel="icon" type="image/svg+xml" href="/mimir-favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary:    #0058AB;
  --dark:       #121A38;
  --accent:     #1DB8F2;
  --turquoise:  #00D5D0;
  --bg:         #F0F4F8;
  --surface:    #FFFFFF;
  --border:     #D1DCE8;
  --text:       #121A38;
  --text-muted: #5A6A80;
  --green-live: #22C55E;
  --gradient:   linear-gradient(90deg, #121A38 0%, #0058AB 30%, #1DB8F2 70%, #00D5D0 100%);
}

body {
  font-family: 'Ubuntu', sans-serif;
  font-size: 14px;
  font-weight: 400;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ─── TOP BAR ─────────────────────────────────────────────────────────────── */
#topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 24px;
  height: 56px;
  background: var(--dark);
  flex-shrink: 0;
}

#topbar .brand {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: #FFFFFF;
  margin-right: 8px;
  white-space: nowrap;
}

#topbar .separator {
  width: 1px;
  height: 28px;
  background: rgba(255,255,255,0.15);
  flex-shrink: 0;
}

#session-label {
  font-size: 13px;
  font-weight: 400;
  color: rgba(255,255,255,0.75);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 280px;
}

#live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(34,197,94,0.12);
  border: 1px solid rgba(34,197,94,0.35);
  border-radius: 20px;
  padding: 3px 10px 3px 6px;
  font-size: 11px;
  font-weight: 500;
  color: #4ADE80;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  white-space: nowrap;
  flex-shrink: 0;
}

#live-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green-live);
  animation: pulse-dot 1.8s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.45; transform: scale(0.75); }
}

#topbar .spacer { flex: 1; }

#btn-synthesize {
  padding: 7px 18px;
  background: var(--primary);
  color: #FFFFFF;
  border: none;
  border-radius: 4px;
  font-family: 'Ubuntu', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}
#btn-synthesize:hover { background: #004A90; }
#btn-synthesize:disabled { background: #3A5A80; cursor: default; }

#synth-spinner {
  display: none;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #FFFFFF;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#llm-badge {
  padding: 4px 10px;
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 4px;
  font-size: 11px;
  font-weight: 400;
  color: rgba(255,255,255,0.55);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

/* ─── GRADIENT SEPARATOR ──────────────────────────────────────────────────── */
.gradient-bar {
  height: 3px;
  background: var(--gradient);
  flex-shrink: 0;
}

/* ─── MAIN LAYOUT ─────────────────────────────────────────────────────────── */
#main {
  display: flex;
  flex: 1;
  gap: 0;
  overflow: hidden;
}

/* ─── LEFT COLUMN — TRANSCRIPT ────────────────────────────────────────────── */
#col-left {
  width: 360px;
  min-width: 280px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--surface);
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.panel-title {
  font-size: 12px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
}

.btn-secondary {
  padding: 4px 12px;
  background: transparent;
  color: var(--primary);
  border: 1px solid var(--primary);
  border-radius: 4px;
  font-family: 'Ubuntu', sans-serif;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.btn-secondary:hover {
  background: var(--primary);
  color: #FFFFFF;
}

#transcript-panel {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

#partial-line {
  padding: 4px 0;
  color: var(--text-muted);
  font-style: italic;
  font-size: 13px;
  min-height: 22px;
  border-left: 2px solid var(--accent);
  padding-left: 8px;
}

.segment {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 3px 0;
}

.segment .ts {
  font-size: 11px;
  font-weight: 300;
  color: var(--text-muted);
  white-space: nowrap;
  padding-top: 1px;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

.segment .txt {
  font-size: 13px;
  font-weight: 400;
  line-height: 1.5;
  color: var(--text);
}

/* ─── RIGHT COLUMN ────────────────────────────────────────────────────────── */
#col-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
  gap: 0;
}

/* ─── SYNTHESIS PANEL ─────────────────────────────────────────────────────── */
#synthesis-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}

#synthesis-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 12px;
}

#synthesis-header .panel-title { flex: 1; }

#synth-age {
  font-size: 11px;
  font-weight: 300;
  color: var(--text-muted);
  white-space: nowrap;
}

#synth-inline-spinner {
  display: none;
  width: 14px;
  height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}

#themes-container {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

#synth-empty {
  color: var(--text-muted);
  font-size: 13px;
  font-style: italic;
  margin-top: 8px;
}

/* Theme card */
.theme-card {
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.theme-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: #F7FAFD;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}

.theme-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--dark);
  flex: 1;
}

.btn-copy-theme {
  padding: 3px 10px;
  background: transparent;
  color: var(--primary);
  border: 1px solid var(--primary);
  border-radius: 4px;
  font-family: 'Ubuntu', sans-serif;
  font-size: 10px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s, color 0.15s;
  flex-shrink: 0;
}
.btn-copy-theme:hover { background: var(--primary); color: #FFFFFF; }

.theme-columns {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
}

.theme-col {
  padding: 12px 14px;
  border-right: 1px solid var(--border);
}
.theme-col:last-child { border-right: none; }

.theme-col-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.4px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.label-align  { color: #16A34A; }
.label-disag  { color: #DC2626; }
.label-unsett { color: #D97706; }

.theme-col ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.theme-col ul li {
  font-size: 12px;
  font-weight: 300;
  line-height: 1.45;
  color: var(--text);
  padding-left: 10px;
  position: relative;
}
.theme-col ul li::before {
  content: '·';
  position: absolute;
  left: 0;
  color: var(--text-muted);
}

/* Synthesis action bar */
#synth-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  border-top: 1px solid var(--border);
  background: #F7FAFD;
  flex-shrink: 0;
}

.btn-action {
  padding: 6px 14px;
  background: transparent;
  color: var(--primary);
  border: 1px solid var(--primary);
  border-radius: 4px;
  font-family: 'Ubuntu', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}
.btn-action:hover { background: var(--primary); color: #FFFFFF; }

.btn-action-primary {
  background: var(--primary);
  color: #FFFFFF;
  border: 1px solid var(--primary);
  padding: 6px 14px;
  border-radius: 4px;
  font-family: 'Ubuntu', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
.btn-action-primary:hover { background: #004A90; border-color: #004A90; }
.btn-action-primary:disabled { background: #3A5A80; border-color: #3A5A80; cursor: default; }

/* ─── Q&A PANEL ───────────────────────────────────────────────────────────── */
#qa-panel {
  flex-shrink: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  max-height: 280px;
}

#qa-panel .panel-header {
  flex-shrink: 0;
}

#qa-input-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#qa-input {
  flex: 1;
  padding: 7px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: 'Ubuntu', sans-serif;
  font-size: 13px;
  font-weight: 400;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color 0.15s;
}
#qa-input:focus { border-color: var(--primary); }
#qa-input::placeholder { color: var(--text-muted); }

#btn-qa-send {
  padding: 7px 16px;
  background: var(--accent);
  color: var(--dark);
  border: none;
  border-radius: 4px;
  font-family: 'Ubuntu', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
#btn-qa-send:hover { background: #15A8DC; }
#btn-qa-send:disabled { background: #90D4EF; cursor: default; }

#qa-answer-area {
  flex: 1;
  overflow-y: auto;
  padding: 12px 20px;
  min-height: 48px;
}

#qa-answer-text {
  font-size: 13px;
  font-weight: 400;
  line-height: 1.6;
  color: var(--text);
  white-space: pre-wrap;
}

#qa-answer-placeholder {
  font-size: 13px;
  color: var(--text-muted);
  font-style: italic;
}

#qa-spinner {
  display: none;
  width: 14px;
  height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}

/* ─── STATUS TOAST ────────────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--dark);
  color: #FFFFFF;
  font-size: 12px;
  font-weight: 400;
  padding: 8px 18px;
  border-radius: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 999;
  white-space: nowrap;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ─── SCROLLBAR ───────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #A8BBCC; }
</style>
</head>
<body>

<!-- ─── TOP BAR ──────────────────────────────────────────────────────────── -->
<div id="topbar">
  <span class="brand">Mímir</span>
  <div class="separator"></div>
  <span id="session-label">Session en cours…</span>
  <div id="live-badge">
    <div id="live-dot"></div>
    Live
  </div>
  <div class="spacer"></div>
  <button id="btn-synthesize">
    <div id="synth-spinner"></div>
    Synthétiser
  </button>
  <div id="llm-badge">LLM</div>
</div>

<div class="gradient-bar"></div>

<!-- ─── MAIN ─────────────────────────────────────────────────────────────── -->
<div id="main">

  <!-- Left column: transcript -->
  <div id="col-left">
    <div class="panel-header">
      <span class="panel-title">Transcription</span>
      <button class="btn-secondary" id="btn-copy-all">Copier tout</button>
    </div>
    <div id="transcript-panel">
      <div id="partial-line"></div>
    </div>
  </div>

  <!-- Right column -->
  <div id="col-right">

    <!-- Synthesis panel -->
    <div id="synthesis-panel">
      <div id="synthesis-header">
        <span class="panel-title">Synthèse thématique</span>
        <div id="synth-inline-spinner"></div>
        <span id="synth-age"></span>
      </div>
      <div id="themes-container">
        <span id="synth-empty">Cliquez sur « Synthétiser » pour générer une synthèse.</span>
      </div>
      <div id="synth-actions">
        <button class="btn-action" id="btn-copy-md">Copier en markdown</button>
        <button class="btn-action-primary" id="btn-export-pptx">Exporter PPTX</button>
      </div>
    </div>

    <!-- Q&A panel -->
    <div id="qa-panel">
      <div class="panel-header">
        <span class="panel-title">Questions &amp; réponses</span>
        <div id="qa-spinner"></div>
      </div>
      <div id="qa-input-row">
        <input id="qa-input" type="text" placeholder="Posez une question sur les échanges…" autocomplete="off">
        <button id="btn-qa-send">Envoyer</button>
      </div>
      <div id="qa-answer-area">
        <span id="qa-answer-placeholder">La réponse apparaîtra ici.</span>
        <span id="qa-answer-text" style="display:none"></span>
      </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
'use strict';

// ─── Utility: HTML escape ─────────────────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─── Utility: toast notification ─────────────────────────────────────────────
let _toastTimer = null;
function showToast(msg, duration = 2400) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// ─── Utility: format timestamp ────────────────────────────────────────────────
function fmtTime(ts) {
  const d = ts ? new Date(ts * 1000) : new Date();
  const h = String(d.getHours()).padStart(2, '0');
  const m = String(d.getMinutes()).padStart(2, '0');
  return `${h}:${m}`;
}

// ─── Utility: age string ──────────────────────────────────────────────────────
function fmtAge(secs) {
  if (secs < 60)  return `il y a ${Math.round(secs)}s`;
  if (secs < 3600) return `il y a ${Math.round(secs/60)}min`;
  return `il y a ${Math.round(secs/3600)}h`;
}

// ─── State ─────────────────────────────────────────────────────────────────────
let sessionId = null;
let segments  = []; // [{ts, text}]
let themes    = []; // [{name, alignment[], disagreement[], unresolved[]}]
let synthAt   = null; // timestamp of last synthesis (Date)
let ageTimer  = null;

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const transcriptPanel   = document.getElementById('transcript-panel');
const partialLine       = document.getElementById('partial-line');
const sessionLabel      = document.getElementById('session-label');
const llmBadge          = document.getElementById('llm-badge');
const btnSynthesize     = document.getElementById('btn-synthesize');
const synthSpinner      = document.getElementById('synth-spinner');
const synthInlineSpinner= document.getElementById('synth-inline-spinner');
const synthAge          = document.getElementById('synth-age');
const themesContainer   = document.getElementById('themes-container');
const synthEmpty        = document.getElementById('synth-empty');
const qaInput           = document.getElementById('qa-input');
const btnQaSend         = document.getElementById('btn-qa-send');
const qaAnswerArea      = document.getElementById('qa-answer-area');
const qaAnswerText      = document.getElementById('qa-answer-text');
const qaAnswerPlaceholder = document.getElementById('qa-answer-placeholder');
const qaSpinner         = document.getElementById('qa-spinner');

// ─── Transcript helpers ────────────────────────────────────────────────────────
function addSegment(ts, text, scroll = true) {
  segments.push({ ts, text });
  const row = document.createElement('div');
  row.className = 'segment';
  row.innerHTML = `<span class="ts">[${fmtTime(ts)}]</span><span class="txt">${esc(text)}</span>`;
  // Insert before partial-line if it exists at bottom
  transcriptPanel.insertBefore(row, partialLine);
  if (scroll) {
    transcriptPanel.scrollTop = transcriptPanel.scrollHeight;
  }
}

function setPartial(text) {
  partialLine.textContent = text || '';
}

// ─── Synthesis rendering ───────────────────────────────────────────────────────
function renderThemes(data) {
  themes = data.themes || [];
  synthEmpty.style.display = themes.length ? 'none' : '';
  // Remove existing theme cards
  themesContainer.querySelectorAll('.theme-card').forEach(c => c.remove());

  themes.forEach((theme, idx) => {
    const card = document.createElement('div');
    card.className = 'theme-card';
    card.dataset.idx = idx;

    const alignItems  = (theme.alignment    || []).map(b => `<li>${esc(b)}</li>`).join('');
    const disagItems  = (theme.disagreement || []).map(b => `<li>${esc(b)}</li>`).join('');
    const unsettItems = (theme.unresolved   || []).map(b => `<li>${esc(b)}</li>`).join('');

    card.innerHTML = `
      <div class="theme-card-header">
        <span class="theme-name">${esc(theme.name || '')}</span>
        <button class="btn-copy-theme" data-idx="${idx}">Copier</button>
      </div>
      <div class="theme-columns">
        <div class="theme-col">
          <div class="theme-col-label label-align">✓ Alignement</div>
          <ul>${alignItems || '<li style="color:var(--text-muted);font-style:italic">—</li>'}</ul>
        </div>
        <div class="theme-col">
          <div class="theme-col-label label-disag">✗ Désaccord</div>
          <ul>${disagItems || '<li style="color:var(--text-muted);font-style:italic">—</li>'}</ul>
        </div>
        <div class="theme-col">
          <div class="theme-col-label label-unsett">? Non tranché</div>
          <ul>${unsettItems || '<li style="color:var(--text-muted);font-style:italic">—</li>'}</ul>
        </div>
      </div>`;
    themesContainer.appendChild(card);
  });

  // Per-theme copy buttons
  themesContainer.querySelectorAll('.btn-copy-theme').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx, 10);
      copyThemeAsMarkdown(themes[idx]);
    });
  });
}

function themeToMarkdown(theme) {
  let md = `### ${theme.name || 'Thème'}\n\n`;
  const sections = [
    { label: '✓ Alignement', key: 'alignment' },
    { label: '✗ Désaccord',  key: 'disagreement' },
    { label: '? Non tranché', key: 'unresolved' },
  ];
  sections.forEach(s => {
    const items = theme[s.key] || [];
    if (items.length) {
      md += `**${s.label}**\n`;
      items.forEach(b => { md += `- ${b}\n`; });
      md += '\n';
    }
  });
  return md.trim();
}

function copyThemeAsMarkdown(theme) {
  const md = themeToMarkdown(theme);
  navigator.clipboard.writeText(md)
    .then(() => showToast('Thème copié en markdown'))
    .catch(() => showToast('Erreur de copie'));
}

function allThemesAsMarkdown() {
  if (!themes.length) return '';
  const now = new Date();
  const header = `# Synthèse workshop — ${now.toLocaleDateString('fr-FR')} ${now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})}\n\n`;
  return header + themes.map(themeToMarkdown).join('\n\n---\n\n');
}

// ─── Age counter ──────────────────────────────────────────────────────────────
function startAgeCounter() {
  clearInterval(ageTimer);
  ageTimer = setInterval(() => {
    if (!synthAt) return;
    const secs = (Date.now() - synthAt) / 1000;
    synthAge.textContent = fmtAge(secs);
  }, 5000);
}

// ─── Synthesis: trigger ───────────────────────────────────────────────────────
async function triggerSynthesis() {
  btnSynthesize.disabled = true;
  synthSpinner.style.display = 'block';
  synthInlineSpinner.style.display = 'block';
  synthAge.textContent = 'Génération…';

  try {
    const res = await fetch('/v1/live-synthesis', { method: 'POST' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) {
      showToast(`Erreur : ${data.error}`, 3500);
    } else {
      renderThemes(data);
      synthAt = Date.now();
      synthAge.textContent = 'À l\'instant';
      startAgeCounter();
    }
  } catch (err) {
    showToast('Impossible de synthétiser. Réessayez.', 3500);
    synthAge.textContent = '';
  } finally {
    btnSynthesize.disabled = false;
    synthSpinner.style.display = 'none';
    synthInlineSpinner.style.display = 'none';
  }
}

// ─── Q&A ─────────────────────────────────────────────────────────────────────
async function sendQuestion() {
  const q = qaInput.value.trim();
  if (!q) return;
  qaInput.disabled = true;
  btnQaSend.disabled = true;
  qaSpinner.style.display = 'block';
  qaAnswerPlaceholder.style.display = 'none';
  qaAnswerText.style.display = 'none';
  qaAnswerText.textContent = '';

  try {
    const res = await fetch('/v1/qa', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) {
      qaAnswerText.textContent = `Erreur : ${data.error}`;
    } else {
      qaAnswerText.textContent = data.answer || '';
    }
    qaAnswerText.style.display = '';
    qaInput.value = '';
  } catch (err) {
    qaAnswerText.textContent = 'Impossible d\'obtenir une réponse.';
    qaAnswerText.style.display = '';
  } finally {
    qaInput.disabled = false;
    btnQaSend.disabled = false;
    qaSpinner.style.display = 'none';
    qaInput.focus();
  }
}

// ─── Export PPTX ─────────────────────────────────────────────────────────────
async function exportPptx() {
  if (!sessionId) { showToast('Aucune session active.'); return; }
  const btn = document.getElementById('btn-export-pptx');
  btn.disabled = true;
  btn.textContent = 'Export en cours…';
  try {
    const res = await fetch(`/v1/sessions/${encodeURIComponent(sessionId)}/export/synthesis-pptx`, {
      method: 'POST',
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const cd   = res.headers.get('Content-Disposition') || '';
    const fnMatch = cd.match(/filename="([^"]+)"/);
    a.download = fnMatch ? fnMatch[1] : 'synthesis.pptx';
    a.href = url;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('PPTX téléchargé.');
  } catch (err) {
    showToast('Erreur lors de l\'export PPTX.', 3500);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Exporter PPTX';
  }
}

// ─── Copy all transcript ──────────────────────────────────────────────────────
document.getElementById('btn-copy-all').addEventListener('click', () => {
  if (!segments.length) { showToast('Aucune transcription disponible.'); return; }
  const text = segments.map(s => `[${fmtTime(s.ts)}] ${s.text}`).join('\n');
  navigator.clipboard.writeText(text)
    .then(() => showToast('Transcription copiée.'))
    .catch(() => showToast('Erreur de copie.'));
});

// ─── Button bindings ──────────────────────────────────────────────────────────
btnSynthesize.addEventListener('click', triggerSynthesis);

document.getElementById('btn-copy-md').addEventListener('click', () => {
  const md = allThemesAsMarkdown();
  if (!md) { showToast('Aucune synthèse à copier.'); return; }
  navigator.clipboard.writeText(md)
    .then(() => showToast('Synthèse copiée en markdown.'))
    .catch(() => showToast('Erreur de copie.'));
});

document.getElementById('btn-export-pptx').addEventListener('click', exportPptx);

btnQaSend.addEventListener('click', sendQuestion);
qaInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
});

// ─── WebSocket ────────────────────────────────────────────────────────────────
let ws = null;
let wsConnected = false;
let pingInterval = null;
let reconnectTimeout = null;

function wsConnect() {
  if (reconnectTimeout) { clearTimeout(reconnectTimeout); reconnectTimeout = null; }

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.addEventListener('open', () => {
    wsConnected = true;
    document.getElementById('live-dot').style.animationPlayState = 'running';
    // Keepalive
    clearInterval(pingInterval);
    pingInterval = setInterval(() => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'ping' }));
      }
    }, 20000);
  });

  ws.addEventListener('close', () => {
    wsConnected = false;
    clearInterval(pingInterval);
    document.getElementById('live-dot').style.animationPlayState = 'paused';
    // Auto-reconnect
    reconnectTimeout = setTimeout(wsConnect, 3000);
  });

  ws.addEventListener('error', () => {
    ws.close();
  });

  ws.addEventListener('message', e => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    handleMessage(msg);
  });
}

function handleMessage(msg) {
  switch (msg.type) {

    case 'transcript': {
      setPartial('');
      if (msg.text) addSegment(msg.timestamp || null, msg.text);
      break;
    }

    case 'partial_transcript': {
      setPartial(msg.text || '');
      break;
    }

    case 'live_synthesis': {
      // Server-pushed synthesis
      if (msg.themes) {
        renderThemes(msg);
        synthAt = (msg.generated_at ? msg.generated_at * 1000 : Date.now());
        synthAge.textContent = 'À l\'instant';
        startAgeCounter();
      }
      break;
    }

    case 'restore': {
      // Replay segments
      segments = [];
      transcriptPanel.querySelectorAll('.segment').forEach(el => el.remove());
      setPartial('');
      const segs = msg.segments || [];
      segs.forEach(s => {
        addSegment(s.timestamp || s.ts || null, s.text || '', false);
      });
      transcriptPanel.scrollTop = transcriptPanel.scrollHeight;
      // Session id
      if (msg.snapshot && msg.snapshot.session_id) {
        sessionId = msg.snapshot.session_id;
        sessionLabel.textContent = `Session ${sessionId.slice(0, 8)}`;
      }
      break;
    }

    case 'status': {
      if (msg.provider) {
        llmBadge.textContent = msg.provider.toUpperCase();
      }
      if (msg.session_id) {
        sessionId = msg.session_id;
        sessionLabel.textContent = `Session ${sessionId.slice(0, 8)}`;
      }
      break;
    }

    case 'session_reset': {
      sessionId = msg.session_id || null;
      segments = [];
      transcriptPanel.querySelectorAll('.segment').forEach(el => el.remove());
      setPartial('');
      themes = [];
      themesContainer.querySelectorAll('.theme-card').forEach(c => c.remove());
      synthEmpty.style.display = '';
      synthAt = null;
      synthAge.textContent = '';
      sessionLabel.textContent = sessionId ? `Session ${sessionId.slice(0, 8)}` : 'Nouvelle session';
      showToast('Nouvelle session démarrée.');
      break;
    }

    case 'metrics': {
      // Optional: expose provider name from metrics
      if (msg.provider) llmBadge.textContent = msg.provider.toUpperCase();
      break;
    }

    default:
      break;
  }
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
wsConnect();
</script>
