<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mímir</title>
<link rel="icon" type="image/svg+xml" href="/mimir-favicon.svg">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=IBM+Plex+Mono:wght@300;400;500&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg: #060610;
  --panel: #0a0b14;
  --card: rgba(255,255,255,0.03);
  --bdr: rgba(255,255,255,0.06);
  --txt: #c8cad4;
  --dim: #484b5e;
  --bright: #eeeef2;
  --green: #34d399;
  --purple: #a78bfa;
  --rose: #fb7185;
  --amber: #fbbf24;
  --blue: #60a5fa;
  --cyan: #22d3ee;
  --teal: #2dd4bf;
  --orange: #fb923c;
  --pink: #f0abfc;
  --lime: #a3e635;
}

body {
  background: var(--bg);
  color: var(--txt);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  height: 100vh;
}

/* ========== WAITING STATE ========== */
#waiting {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  transition: opacity .6s, visibility .6s;
}
#waiting.gone { opacity: 0; visibility: hidden; pointer-events: none; }
.waiting-inner {
  text-align: center;
}
.waiting-inner .tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; font-weight: 400;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--green); margin-bottom: 10px;
}
.waiting-inner h1 {
  font-size: 32px; font-weight: 300;
  color: var(--bright); margin-bottom: 16px;
  letter-spacing: -0.5px;
}
.waiting-inner .wait-msg {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--dim);
  letter-spacing: 0.5px;
}
.waiting-inner .wait-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--dim);
  margin-bottom: 24px;
  animation: waitpulse 2s ease infinite;
}
@keyframes waitpulse {
  0%, 100% { background: var(--dim); box-shadow: none; }
  50% { background: var(--green); box-shadow: 0 0 12px rgba(52,211,153,0.5); }
}

/* ========== MAIN LAYOUT ========== */
#app {
  display: grid;
  grid-template-columns: 1fr 320px;
  height: 100vh;
  opacity: 0;
  transition: opacity .7s ease .3s;
}
#app.on { opacity: 1; }

/* ========== CANVAS ========== */
#canvas {
  position: relative; overflow: hidden;
  background: var(--bg);
}
#canvas svg { width: 100%; height: 100%; display: block; }

/* Subtle gradient atmosphere */
.atmo {
  position: absolute; pointer-events: none;
  border-radius: 50%; filter: blur(100px);
  opacity: 0.07; transition: all 5s ease;
}
.atmo.a1 { width: 500px; height: 500px; background: var(--purple); top: 15%; left: 25%; }
.atmo.a2 { width: 400px; height: 400px; background: var(--green); bottom: 15%; right: 15%; }
.atmo.a3 { width: 300px; height: 300px; background: var(--rose); top: 50%; left: 60%; }

/* Status pill */
#pill {
  position: absolute; top: 24px; left: 24px;
  display: flex; align-items: center; gap: 10px;
  padding: 8px 18px 8px 14px;
  background: rgba(10,11,20,0.8);
  border: 1px solid var(--bdr);
  border-radius: 100px;
  backdrop-filter: blur(20px);
  z-index: 10;
}
.led {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--dim); transition: all .4s;
  flex-shrink: 0;
}
.led.on {
  background: var(--green);
  box-shadow: 0 0 10px rgba(52,211,153,0.6);
  animation: pulse 3s ease infinite;
}
.led.think {
  background: var(--purple);
  box-shadow: 0 0 10px rgba(167,139,250,0.5);
  animation: pulse .8s ease infinite;
}
.led.warn {
  background: var(--amber);
  box-shadow: 0 0 10px rgba(251,191,36,0.5);
  animation: pulse 1.5s ease infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

#pill-text {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; font-weight: 400;
  letter-spacing: .5px; color: var(--dim);
}

/* Counter */
#counter {
  position: absolute; bottom: 24px; left: 24px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; color: var(--dim);
  letter-spacing: 1px;
  z-index: 10;
}

/* ========== SIDEBAR ========== */
#sidebar {
  background: var(--panel);
  border-left: 1px solid var(--bdr);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.side-head {
  padding: 22px 22px 14px;
  border-bottom: 1px solid var(--bdr);
}
.side-head h3 {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; font-weight: 400;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--dim);
}

/* Transcript */
#transcript-box {
  flex: 1; overflow-y: auto;
  padding: 16px 22px;
  font-size: 13px; line-height: 1.8;
  color: var(--dim);
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.04) transparent;
}
.t-chunk {
  color: var(--txt);
  display: inline;
  animation: fadein .5s ease;
}
.t-chunk.faded { color: var(--dim); }
.t-partial {
  color: var(--dim);
  display: inline;
  font-style: italic;
  opacity: 0.6;
}
@keyframes fadein {
  from { opacity:0; transform: translateY(4px); }
  to { opacity:1; transform: translateY(0); }
}

/* Concept log */
#concepts {
  max-height: 200px; overflow-y: auto;
  padding: 12px 22px 14px;
  border-top: 1px solid var(--bdr);
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.04) transparent;
}
.con-head {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; font-weight: 400;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--dim); margin-bottom: 10px;
}
.con-item {
  display: flex; align-items: center; gap: 8px;
  padding: 3px 0; font-size: 12px;
  animation: fadein .4s ease;
}
.con-dot {
  width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
}

/* Controls */
#ctrl-bar {
  padding: 12px 22px;
  border-top: 1px solid var(--bdr);
  display: flex; gap: 6px;
}
.ctrl {
  flex: 1; padding: 9px;
  background: transparent;
  border: 1px solid var(--bdr);
  border-radius: 6px;
  color: var(--dim);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; font-weight: 400;
  letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; transition: all .2s;
}
.ctrl:hover { border-color: rgba(255,255,255,0.12); color: var(--txt); }
.ctrl.active { border-color: var(--green); color: var(--green); }

/* ========== CONTEXT MENU ========== */
#ctx-menu {
  position: fixed; display: none; z-index: 100;
  background: rgba(10,11,20,0.95);
  border: 1px solid var(--bdr);
  border-radius: 8px;
  padding: 4px;
  backdrop-filter: blur(20px);
  min-width: 140px;
}
#ctx-menu button {
  display: block; width: 100%;
  padding: 8px 14px;
  background: none; border: none;
  color: var(--txt);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; font-weight: 400;
  text-align: left; cursor: pointer;
  border-radius: 4px;
  letter-spacing: 0.3px;
}
#ctx-menu button:hover { background: rgba(255,255,255,0.06); color: var(--bright); }
#ctx-menu button.danger:hover { color: var(--rose); }
.n-group.merge-source .n-outer {
  stroke-dasharray: 4 2;
  stroke-width: 2;
}
.n-group.pinned .n-outer {
  stroke-width: 2;
  opacity: 0.6;
}

/* ========== D3 NODE STYLES ========== */

/* Edges */
.edge-path {
  fill: none;
  stroke: rgba(255,255,255,0.04);
  stroke-width: 1;
  stroke-dasharray: 0;
}
.edge-path.fresh {
  stroke-dasharray: 1000;
  stroke-dashoffset: 1000;
  animation: draw-edge 1.2s ease forwards;
}
@keyframes draw-edge {
  to { stroke-dashoffset: 0; }
}
.edge-text {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px; font-weight: 300;
  fill: rgba(255,255,255,0.12);
  text-anchor: middle;
  pointer-events: none;
  letter-spacing: 0.5px;
}

/* Nodes */
.n-group { cursor: grab; }
.n-group:active { cursor: grabbing; }

.n-aura {
  opacity: 0;
}
.n-group.born .n-aura {
  opacity: 1;
  animation: aura-burst 1.8s ease forwards;
}
@keyframes aura-burst {
  0% { opacity: 0.25; r: 50; }
  100% { opacity: 0; r: 60; }
}

.n-outer {
  fill: none;
  stroke-width: 1;
  opacity: 0.3;
}
.n-inner {
  opacity: 0.08;
}
.n-dot {
  opacity: 0.95;
}

.n-label {
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 11px;
  fill: var(--bright);
  text-anchor: middle;
  pointer-events: none;
  letter-spacing: 0.2px;
}
.n-cat {
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 300;
  font-size: 8px;
  fill: var(--dim);
  text-anchor: middle;
  pointer-events: none;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* Birth animation */
.n-group.born {
  animation: node-pop .8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes node-pop {
  0% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1.2); opacity: 0.8; }
  100% { transform: scale(1); opacity: 1; }
}

/* Breathing */
@keyframes breathe {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.18; }
}

/* ========== BIG SCREEN MODE ========== */
.bigscreen {
  --bg: #0c0c1a;
  --panel: #101120;
  --bdr: rgba(255,255,255,0.08);
  --txt: #d4d6e0;
  --dim: #6b6f88;
  --bright: #f4f4f8;
}
.bigscreen .edge-path {
  stroke: rgba(255,255,255,0.08);
  stroke-width: 1.5;
}
.bigscreen .edge-text {
  font-size: 11px;
  fill: rgba(255,255,255,0.22);
}
.bigscreen .n-outer {
  stroke-width: 1.5;
  opacity: 0.45;
}
.bigscreen .n-inner {
  opacity: 0.12;
}
.bigscreen .n-dot {
  opacity: 1;
}
.bigscreen .n-label {
  font-size: 16px;
  font-weight: 600;
}
.bigscreen .n-cat {
  font-size: 11px;
  fill: var(--dim);
}
.bigscreen .n-group.pinned .n-outer {
  stroke-width: 3;
  opacity: 0.7;
}
.bigscreen #pill {
  padding: 10px 22px 10px 16px;
}
.bigscreen #pill-text {
  font-size: 12px;
}
.bigscreen #counter {
  font-size: 13px;
}
.bigscreen #ctx-menu button {
  font-size: 13px;
  padding: 10px 18px;
}

/* Big screen mode indicator */
#mode-badge {
  position: absolute; top: 24px; right: 24px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; font-weight: 400;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--dim);
  padding: 6px 14px;
  background: rgba(10,11,20,0.6);
  border: 1px solid var(--bdr);
  border-radius: 100px;
  z-index: 10;
  opacity: 0;
  transition: opacity .4s;
  pointer-events: none;
}
#mode-badge.show { opacity: 1; }

/* Connection status dot */
#conn-dot {
  position: fixed;
  bottom: 16px;
  right: 16px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--dim);
  z-index: 100;
  transition: background 0.4s, box-shadow 0.4s;
}
#conn-dot.ok {
  background: var(--green);
  box-shadow: 0 0 8px rgba(52,211,153,0.5);
}
#conn-dot.err {
  background: var(--rose);
  box-shadow: 0 0 8px rgba(251,113,133,0.5);
}
</style>
</head>
<body>

<!-- ===== SETUP ===== -->
<div id="waiting">
  <div class="waiting-inner">
    <img src="/mimir-logo-clean.svg" alt="Mímir" style="width:280px;margin-bottom:32px;opacity:0.85;">
    <div class="wait-dot"></div>
    <div class="wait-msg">Waiting for session to start</div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app" class="bigscreen">
  <div id="canvas">
    <div class="atmo a1"></div>
    <div class="atmo a2"></div>
    <div class="atmo a3"></div>
    <div id="pill">
      <div class="led" id="led"></div>
      <span id="pill-text">Connecting...</span>
    </div>
    <div id="counter">0 concepts</div>
    <div id="mode-badge">Big Screen</div>
    <svg id="viz"></svg>
    <div id="ctx-menu">
      <button data-action="pin">Pin / Unpin</button>
      <button data-action="promote">Promote</button>
      <button data-action="rename">Rename</button>
      <button data-action="merge">Merge into...</button>
      <button data-action="hide" class="danger">Hide</button>
    </div>
  </div>
  <div id="sidebar">
    <div class="side-head"><h3>Transcript</h3></div>
    <div id="transcript-box"></div>
    <div id="concepts">
      <div class="con-head">Concepts</div>
    </div>
  </div>
</div>

<div id="conn-dot"></div>

<script>
// ─── Config ───
const C = {
  interval: 20000,
  minLen: 50,
  maxN: 30,
  model: 'claude-sonnet-4-20250514',
  colors: [
    '#34d399','#a78bfa','#fb7185','#fbbf24','#60a5fa',
    '#22d3ee','#fb923c','#f0abfc','#2dd4bf','#a3e635'
  ],
};

// ─── State ───
const G = {
  topic:'', ws:null,
  txt:'', sent:0, busy:false, paused:false,
  nodes:[], edges:[], cmap:{}, ci:0,
  _claudeId:0, _claudeCbs:{},
  degraded:false, degradedReason:'', degradedRecoveryTimer:null,
  summary:'',
  // New: session + reconnect
  sessionId: null, lastSeq: 0,
  // New: merge mode
  mergeSource: null,
  // New: context menu target
  _ctxNode: null,
  // Display mode
  bigscreen: true,
  // Reset generation — bumped on every reset to discard stale analysis results
  _gen: 0,
};

// ─── Session API ───
// Session lifecycle is managed by the monitor view.
// Display is passive: it receives session_reset and restore via WebSocket.

function clearLocalState() {
  // Clear local display state — full clean slate
  // Called when we receive session_reset from server
  G._gen++;  // invalidate any in-flight analysis
  G._claudeCbs = {};  // drop pending Claude callbacks
  G.nodes=[]; G.edges=[]; G.txt=''; G.sent=0; G.ci=0; G.cmap={}; G.summary='';
  G.sessionId=null; G.lastSeq=0; G.mergeSource=null;
  G.busy=false; G.degraded=false;
  if (G.degradedRecoveryTimer) { clearTimeout(G.degradedRecoveryTimer); G.degradedRecoveryTimer=null; }
  gEdge.selectAll('*').remove();
  gNode.selectAll('*').remove();
  document.getElementById('transcript-box').innerHTML = '';
  document.querySelectorAll('#concepts .con-item').forEach(e=>e.remove());
  document.getElementById('counter').textContent = '0 concepts';
  sim.nodes([]); sim.force('link').links([]);
  localStorage.removeItem(SAVE_KEY);
}

async function execAction(actionType, payload) {
  if (!G.sessionId) return;
  try {
    const resp = await fetch('/v1/sessions/' + G.sessionId + '/actions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action: actionType, payload}),
    });
    const data = await resp.json();
    if (data.graph) applyGraph(data.graph);
  } catch(e) {
    console.warn('Action failed:', e);
  }
}

// ─── WebSocket ───
function _wsUrl() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  return proto + '//' + location.host + '/ws';
}

function _setConnDot(ok) {
  const dot = document.getElementById('conn-dot');
  dot.className = ok ? 'ok' : 'err';
}

function connectWS() {
  G.ws = new WebSocket(_wsUrl());
  G.ws.onopen = () => {
    status('on','Connected');
    _setConnDot(true);
    if (G.sessionId) {
      G.ws.send(JSON.stringify({
        type: 'connect_session',
        session_id: G.sessionId,
        last_seq: G.lastSeq,
      }));
    }
  };
  G.ws.onclose = () => {
    status('','Disconnected');
    _setConnDot(false);
    setTimeout(() => { if (!G.paused) connectWS(); }, 3000);
  };
  G.ws.onerror = () => {
    _setConnDot(false);
  };
  G.ws.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.type === 'partial_transcript' && d.text) {
      if (d.seq) G.lastSeq = d.seq;
      showPartial(d.text);
    } else if (d.type === 'transcript' && d.text) {
      if (d.seq) G.lastSeq = d.seq;
      finalizePartial(d.text);
    } else if (d.type === 'claude_response' && d.req_id && G._claudeCbs[d.req_id]) {
      G._claudeCbs[d.req_id](d);
      delete G._claudeCbs[d.req_id];
    } else if (d.type === 'restore') {
      handleRestore(d);
    } else if (d.type === 'graph_update' && d.graph) {
      // Ignore graph updates from stale sessions
      if (d.session_id && d.session_id !== G.sessionId) return;
      applyGraph(d.graph);
    } else if (d.type === 'session_reset') {
      clearLocalState();
      G.sessionId = d.session_id;
      G.topic = d.topic || '';
      status('on', listeningLabel());
      onSessionActive();
    } else if (d.type === 'session_ended') {
      onSessionEnded();
      status('off', 'Session ended');
    }
  };
}

function handleRestore(data) {
  // Pick up session ID if provided (auto-restore on WS connect)
  if (data.session_id && !G.sessionId) {
    G.sessionId = data.session_id;
    status('on', listeningLabel());
    onSessionActive();
  }
  // Apply snapshot graph if present
  if (data.snapshot && data.snapshot.graph) {
    const g = data.snapshot.graph;
    // Snapshot has full reconciler state; extract active graph
    const activeNodes = [];
    if (g.nodes) {
      for (const [nid, ns] of Object.entries(g.nodes)) {
        if (ns.state === 'active') {
          activeNodes.push({id: ns.id, label: ns.label, group: ns.group});
        }
      }
    }
    if (activeNodes.length > 0) {
      applyGraph({nodes: activeNodes, edges: g.edges || []});
    }
    G.lastSeq = data.snapshot.seq_at || 0;
  }
  // Replay segments since snapshot
  if (data.segments) {
    for (const seg of data.segments) {
      if (!seg.is_partial && seg.text) {
        G.txt += seg.text + ' ';
        pushChunk(seg.text);
      }
      if (seg.seq > G.lastSeq) G.lastSeq = seg.seq;
    }
  }
}

// ─── Transcript UI ───
function pushChunk(t) {
  const box = document.getElementById('transcript-box');
  box.querySelectorAll('.t-chunk:not(.faded)').forEach(c => c.classList.add('faded'));
  const s = document.createElement('span');
  s.className = 't-chunk';
  s.textContent = t + ' ';
  box.appendChild(s);
  box.scrollTop = box.scrollHeight;
}

function showPartial(text) {
  const box = document.getElementById('transcript-box');
  let el = box.querySelector('.t-partial');
  if (!el) {
    box.querySelectorAll('.t-chunk:not(.faded)').forEach(c => c.classList.add('faded'));
    el = document.createElement('span');
    el.className = 't-partial';
    box.appendChild(el);
  }
  el.textContent = text + ' ';
  box.scrollTop = box.scrollHeight;
}

function finalizePartial(text) {
  const box = document.getElementById('transcript-box');
  const partial = box.querySelector('.t-partial');
  if (partial) partial.remove();
  G.txt += text + ' ';
  pushChunk(text);
}

// ─── LLM ───
function callClaude(body) {
  return new Promise((resolve, reject) => {
    if (!G.ws || G.ws.readyState !== 1) {
      const err = new Error('WebSocket not connected'); err.statusCode = 0;
      return reject(err);
    }
    const id = String(++G._claudeId);
    const timeout = setTimeout(() => { delete G._claudeCbs[id]; const err = new Error('Claude request timeout'); err.statusCode = 0; reject(err); }, 120000);
    G._claudeCbs[id] = resp => {
      clearTimeout(timeout);
      if (resp.status !== 200) {
        const msg = resp.status === 429 ? 'Rate limited' : resp.status === 503 ? 'Circuit breaker open' : `API error ${resp.status}`;
        const err = new Error(msg); err.statusCode = resp.status; err.retryAfter = resp.data?.retry_after;
        reject(err);
      } else {
        resolve(resp.data);
      }
    };
    G.ws.send(JSON.stringify({type:'claude_request', req_id:id, body}));
  });
}

function extractGraphJSON(raw) {
  // Robust JSON extraction — handles thinking preamble, markdown fences, extra text
  const cleaned = raw.replace(/```json\s*/g,'').replace(/```\s*/g,'');
  // Find {"nodes" and parse from there
  const idx = cleaned.indexOf('{"nodes"');
  const idx2 = cleaned.indexOf('{ "nodes"');
  const start = idx >= 0 ? idx : idx2;
  if (start >= 0) {
    let depth = 0;
    for (let i = start; i < cleaned.length; i++) {
      if (cleaned[i] === '{') depth++;
      else if (cleaned[i] === '}') { depth--; if (depth === 0) {
        return JSON.parse(cleaned.slice(start, i + 1));
      }}
    }
  }
  // Fallback: try the whole thing
  return JSON.parse(cleaned.trim());
}

let _lastAnalysis = 0;
const HEARTBEAT_MS = 60000; // force re-analysis if stale for 60s

async function analyze() {
  if (G.busy || G.paused) return;
  if (G.degraded) return;
  const fresh = G.txt.slice(G.sent).trim();
  const now = Date.now();
  const stale = G.nodes.length > 0 && (now - _lastAnalysis) > HEARTBEAT_MS;
  if (fresh.length < C.minLen && !stale) return;

  G.busy = true;
  const gen = G._gen;
  status('think','Mapping concepts...');

  const curGraph = {
    nodes: G.nodes.map(n => ({id:n.id, label:n.label, group:n.group})),
    edges: G.edges.map(e => ({
      source: typeof e.source === 'object' ? e.source.id : e.source,
      target: typeof e.target === 'object' ? e.target.id : e.target,
      label: e.label
    })),
  };

  const sys = `You generate mind-map graphs from meeting transcripts. Return ONLY valid JSON.

Rules:
- Max ${C.maxN} nodes. Merge lesser concepts to stay under limit.
- Node: {"id":"n1","label":"Short Name","group":"Category"}
  - label: 2-4 words, title case
  - group: broad category for color clustering
- Edge: {"source":"n1","target":"n2","label":"verb"}
  - label: 1-2 word relationship (e.g. "drives", "enables", "part of")
- Preserve existing node IDs. Add only genuinely important new concepts.
- Remove nodes that are no longer relevant as the conversation evolves.
- Create edges that reveal the STRUCTURE of the discussion, not just proximity.
${G.topic ? `- Meeting context: "${G.topic}"` : ''}

Return: {"nodes":[...],"edges":[...],"summary":"<2-3 sentence summary of all key points discussed so far>"}`;

  // Send only the last 3000 chars of fresh text to keep prompt bounded
  const segment = fresh.length > 3000 ? fresh.slice(-3000) : fresh;
  const contextBlock = G.summary
    ? `CONTEXT SUMMARY:\n"${G.summary}"`
    : (G.txt.length > 0 ? `INITIAL TRANSCRIPT:\n"${G.txt.slice(0, 3000)}"` : '');
  const usr = `CURRENT GRAPH:\n${JSON.stringify(curGraph)}\n\nNEW SEGMENT:\n"${segment}"\n\n${contextBlock}\n\nReturn the updated graph.`;

  const body = { model: C.model, max_tokens: 2000, system: sys, messages: [{role:'user', content:usr}] };
  const MAX_RETRIES = 2;

  for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
    try {
      if (attempt > 0) {
        await new Promise(r => setTimeout(r, 1000 * Math.pow(2, attempt)));
        status('think', `Retrying analysis (${attempt}/${MAX_RETRIES})...`);
      }
      const d = await callClaude(body);
      if (gen !== G._gen) break;
      const raw = d.content.map(c => c.text||'').join('');
      const g = extractGraphJSON(raw);
      if (g.nodes && g.edges) {
        applyGraph(g);
        if (g.summary) G.summary = g.summary;
        // Compact: keep only text not yet analyzed
        G.sent = G.txt.length;
        _lastAnalysis = Date.now();
      }
      clearDegraded();
      break;
    } catch(e) {
      console.error('LLM:', e);
      if (e.statusCode === 429 || e.statusCode === 503) {
        enterDegraded(e.statusCode === 429 ? 'Rate limited by API' : 'Circuit breaker open');
        break;
      }
      if ((e.statusCode === 0 || e.statusCode >= 500) && attempt < MAX_RETRIES) continue;
      if (attempt === MAX_RETRIES) {
        enterDegraded('API errors after retries');
      } else {
        status('', 'Analysis failed');
        setTimeout(() => { if (!G.paused && !G.degraded) status('on', listeningLabel()); }, 5000);
      }
      break;
    }
  }

  G.busy = false;
  if (!G.paused && !G.degraded) status('on', listeningLabel());
}

function enterDegraded(reason) {
  G.degraded = true;
  G.degradedReason = reason;
  status('warn', 'Mind map paused \u2014 ' + reason);
  const backoff = reason.includes('Rate limited') ? 30000 : 15000;
  if (G.degradedRecoveryTimer) clearTimeout(G.degradedRecoveryTimer);
  G.degradedRecoveryTimer = setTimeout(attemptRecovery, backoff);
}

function clearDegraded() {
  if (!G.degraded) return;
  G.degraded = false;
  G.degradedReason = '';
  if (G.degradedRecoveryTimer) { clearTimeout(G.degradedRecoveryTimer); G.degradedRecoveryTimer = null; }
}

function attemptRecovery() {
  G.degraded = false;
  G.degradedReason = '';
  G.degradedRecoveryTimer = null;
  if (!G.paused) status('on', listeningLabel());
}

// ─── Graph data ───
function color(group) {
  if (!G.cmap[group]) G.cmap[group] = C.colors[G.ci++ % C.colors.length];
  return G.cmap[group];
}

function applyGraph(g) {
  const prev = new Set(G.nodes.map(n=>n.id));
  const nids = new Set(g.nodes.map(n=>n.id));

  G.nodes = g.nodes.map(n => {
    const o = G.nodes.find(x => x.id === n.id);
    return {
      ...n,
      x: o ? o.x : W/2 + (Math.random()-.5)*200,
      y: o ? o.y : H/2 + (Math.random()-.5)*200,
      vx: o ? o.vx : 0, vy: o ? o.vy : 0,
      isNew: !prev.has(n.id),
      color: color(n.group),
      pinned: n.pinned || false,
      importance: n.importance || 0,
      state: n.state || 'active',
    };
  });

  const prevEdgeKeys = new Set(G.edges.map(e => {
    const s = typeof e.source === 'object' ? e.source.id : e.source;
    const t = typeof e.target === 'object' ? e.target.id : e.target;
    return s + '->' + t;
  }));

  G.edges = g.edges.filter(e => {
    const s = e.source?.id || e.source;
    const t = e.target?.id || e.target;
    return nids.has(s) && nids.has(t);
  }).map(e => {
    const s = e.source?.id || e.source;
    const t = e.target?.id || e.target;
    return {
      source: s, target: t,
      label: e.label || '',
      isNew: !prevEdgeKeys.has(s + '->' + t),
    };
  });

  G.nodes.filter(n => n.isNew).forEach(n => logConcept(n.label, n.color));
  document.getElementById('counter').textContent = G.nodes.length + ' concepts';
  render();
}

function logConcept(label, col) {
  const box = document.getElementById('concepts');
  const d = document.createElement('div');
  d.className = 'con-item';
  d.innerHTML = `<span class="con-dot" style="background:${col}"></span><span>${label}</span>`;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

// ─── Context menu ───
function showContextMenu(event, d) {
  event.preventDefault();
  G._ctxNode = d;
  const menu = document.getElementById('ctx-menu');
  menu.style.display = 'block';
  menu.style.left = event.clientX + 'px';
  menu.style.top = event.clientY + 'px';
  // Update pin label
  const pinBtn = menu.querySelector('[data-action="pin"]');
  pinBtn.textContent = d.pinned ? 'Unpin' : 'Pin';
  // If in merge mode, show target state
  if (G.mergeSource) {
    menu.style.display = 'none';
    if (G.mergeSource.id !== d.id) {
      execAction('merge', {source_id: G.mergeSource.id, target_id: d.id});
      gNode.selectAll('.merge-source').classed('merge-source', false);
      G.mergeSource = null;
    }
  }
}

document.addEventListener('click', () => {
  document.getElementById('ctx-menu').style.display = 'none';
  // Cancel merge mode if clicking on empty space
  if (G.mergeSource) {
    gNode.selectAll('.merge-source').classed('merge-source', false);
    G.mergeSource = null;
    status('on', listeningLabel());
  }
});

document.querySelectorAll('#ctx-menu button').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    const action = btn.dataset.action;
    const node = G._ctxNode;
    if (!node) return;
    document.getElementById('ctx-menu').style.display = 'none';

    if (action === 'rename') {
      const newLabel = prompt('Rename node:', node.label);
      if (newLabel && newLabel.trim()) {
        execAction('rename', {node_id: node.id, label: newLabel.trim()});
      }
    } else if (action === 'merge') {
      G.mergeSource = node;
      gNode.selectAll('.n-group').filter(d => d.id === node.id).classed('merge-source', true);
      status('think', 'Click target node to merge into...');
    } else if (action === 'pin') {
      execAction('pin', {node_id: node.id});
    } else if (action === 'hide') {
      execAction('hide', {node_id: node.id});
    } else if (action === 'promote') {
      execAction('promote', {node_id: node.id});
    }
  });
});

// ─── D3 Viz ───
let svg, sim, gEdge, gNode, W, H;

function initViz() {
  const wrap = document.getElementById('canvas');
  W = wrap.clientWidth; H = wrap.clientHeight;
  svg = d3.select('#viz').attr('width', W).attr('height', H);

  const defs = svg.append('defs');

  const glow = defs.append('filter').attr('id','glow')
    .attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
  glow.append('feGaussianBlur').attr('stdDeviation','5').attr('result','b');
  const fm = glow.append('feMerge');
  fm.append('feMergeNode').attr('in','b');
  fm.append('feMergeNode').attr('in','SourceGraphic');

  const halo = defs.append('filter').attr('id','halo')
    .attr('x','-200%').attr('y','-200%').attr('width','500%').attr('height','500%');
  halo.append('feGaussianBlur').attr('stdDeviation','30');

  gEdge = svg.append('g');
  gNode = svg.append('g');

  sim = d3.forceSimulation()
    .force('link', d3.forceLink().id(d=>d.id).distance(180).strength(0.3))
    .force('charge', d3.forceManyBody().strength(-600).distanceMax(500))
    .force('center', d3.forceCenter(W/2, H/2).strength(0.03))
    .force('collide', d3.forceCollide().radius(65).strength(0.8))
    .force('x', d3.forceX(W/2).strength(0.015))
    .force('y', d3.forceY(H/2).strength(0.015))
    .alphaDecay(0.02)
    .velocityDecay(0.4)
    .on('tick', tick);

  window.addEventListener('resize', () => {
    W = wrap.clientWidth; H = wrap.clientHeight;
    svg.attr('width', W).attr('height', H);
    sim.force('center', d3.forceCenter(W/2, H/2));
    sim.force('x', d3.forceX(W/2).strength(0.015));
    sim.force('y', d3.forceY(H/2).strength(0.015));
    sim.alpha(0.15).restart();
  });
}

function render() {
  // ── Edges ──
  const eData = gEdge.selectAll('.e-group').data(G.edges, d => d.source + '->' + d.target);
  eData.exit().transition().duration(400).style('opacity',0).remove();

  const eEnter = eData.enter().append('g').attr('class','e-group').style('opacity',0);
  eEnter.append('path').attr('class', d => 'edge-path' + (d.isNew ? ' fresh' : ''));
  eEnter.append('text').attr('class','edge-text').text(d => d.label);
  eEnter.transition().duration(800).style('opacity',1);
  eData.select('.edge-text').text(d => d.label);

  // ── Nodes ──
  const nData = gNode.selectAll('.n-group').data(G.nodes, d => d.id);
  nData.exit().transition().duration(400).style('opacity',0).attr('transform', d => `translate(${d.x},${d.y}) scale(0)`).remove();

  const nEnter = nData.enter().append('g')
    .attr('class', d => 'n-group' + (d.isNew ? ' born' : '') + (d.pinned ? ' pinned' : ''))
    .style('opacity', d => d.isNew ? 0 : 1)
    .call(d3.drag()
      .on('start', (e,d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end', (e,d) => { if (!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
    )
    .on('contextmenu', (e, d) => showContextMenu(e, d))
    .on('click', (e, d) => {
      if (G.mergeSource && G.mergeSource.id !== d.id) {
        e.stopPropagation();
        execAction('merge', {source_id: G.mergeSource.id, target_id: d.id});
        gNode.selectAll('.merge-source').classed('merge-source', false);
        G.mergeSource = null;
        status('on', listeningLabel());
      }
    });

  const s = G.bigscreen ? BS.big : BS.normal;
  nEnter.append('circle').attr('class','n-aura')
    .attr('r', s.aura).attr('fill', d=>d.color).attr('filter','url(#halo)');
  nEnter.append('circle').attr('class','n-outer')
    .attr('r', s.outer).attr('stroke', d=>d.color);
  nEnter.append('circle').attr('class','n-inner')
    .attr('r', s.inner).attr('fill', d=>d.color);
  nEnter.append('circle').attr('class','n-dot')
    .attr('r', s.dot).attr('fill', d=>d.color).attr('filter','url(#glow)');
  nEnter.append('text').attr('class','n-label').attr('dy', s.labelDy).text(d=>d.label);
  nEnter.append('text').attr('class','n-cat').attr('dy', s.catDy).text(d=>d.group);

  nEnter.filter(d=>d.isNew).transition().duration(700).ease(d3.easeCubicOut).style('opacity',1);

  setTimeout(() => {
    gNode.selectAll('.born').classed('born', false);
    G.nodes.forEach(n => n.isNew = false);
    G.edges.forEach(e => e.isNew = false);
  }, 2000);

  const merged = nEnter.merge(nData);
  merged.select('.n-label').text(d=>d.label);
  merged.select('.n-cat').text(d=>d.group);
  merged.select('.n-outer').attr('stroke', d=>d.color);
  merged.select('.n-inner').attr('fill', d=>d.color);
  merged.select('.n-dot').attr('fill', d=>d.color);
  merged.select('.n-aura').attr('fill', d=>d.color);
  merged.classed('pinned', d => d.pinned);

  sim.nodes(G.nodes);
  sim.force('link').links(G.edges);
  sim.alpha(0.4).restart();
}

function tick() {
  gEdge.selectAll('.edge-path').attr('d', d => {
    const dx = d.target.x - d.source.x;
    const dy = d.target.y - d.source.y;
    const dr = Math.sqrt(dx*dx + dy*dy) * 1.5;
    return `M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
  });

  gEdge.selectAll('.edge-text')
    .attr('x', d => (d.source.x + d.target.x) / 2 + (d.target.y - d.source.y) * 0.06)
    .attr('y', d => (d.source.y + d.target.y) / 2 - (d.target.x - d.source.x) * 0.06);

  gNode.selectAll('.n-group')
    .attr('transform', d => `translate(${d.x},${d.y})`);
}

// ─── Helpers ───
function listeningLabel() {
  return G.ws && G.ws.readyState === 1 ? 'Connected' : 'Connecting...';
}

// ─── Status ───
function status(mode, text) {
  const led = document.getElementById('led');
  led.className = 'led' + (mode === 'on' ? ' on' : mode === 'think' ? ' think' : mode === 'warn' ? ' warn' : '');
  document.getElementById('pill-text').textContent = text;
}

// ─── FPS tracking ───
let _fpsFrames = 0, _fpsLast = performance.now();
function _fpsLoop() {
  _fpsFrames++;
  const now = performance.now();
  if (now - _fpsLast >= 5000) {
    const fps = Math.round(_fpsFrames / ((now - _fpsLast) / 1000));
    _fpsFrames = 0; _fpsLast = now;
    if (G.ws && G.ws.readyState === 1) {
      G.ws.send(JSON.stringify({type: 'frontend_metrics', fps}));
    }
  }
  requestAnimationFrame(_fpsLoop);
}
requestAnimationFrame(_fpsLoop);

// ─── Big screen mode ───
const BS = {
  normal: { aura: 45, outer: 24, inner: 20, dot: 3, labelDy: 40, catDy: 52, linkDist: 180, charge: -600, collide: 65 },
  big:    { aura: 70, outer: 38, inner: 32, dot: 5, labelDy: 58, catDy: 74, linkDist: 280, charge: -1000, collide: 100 },
};

function toggleBigScreen() {
  G.bigscreen = !G.bigscreen;
  document.getElementById('app').classList.toggle('bigscreen', G.bigscreen);
  const badge = document.getElementById('mode-badge');
  badge.classList.add('show');
  badge.textContent = G.bigscreen ? 'Big Screen' : 'Normal';
  setTimeout(() => badge.classList.remove('show'), 2000);

  const s = G.bigscreen ? BS.big : BS.normal;

  // Update simulation forces
  sim.force('link').distance(s.linkDist);
  sim.force('charge').strength(s.charge);
  sim.force('collide').radius(s.collide);

  // Update all existing node elements
  gNode.selectAll('.n-aura').attr('r', s.aura);
  gNode.selectAll('.n-outer').attr('r', s.outer);
  gNode.selectAll('.n-inner').attr('r', s.inner);
  gNode.selectAll('.n-dot').attr('r', s.dot);
  gNode.selectAll('.n-label').attr('dy', s.labelDy);
  gNode.selectAll('.n-cat').attr('dy', s.catDy);

  sim.alpha(0.3).restart();
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'm' || e.key === 'M') toggleBigScreen();
});

// ─── Ambient breathing ───
setInterval(() => {
  document.querySelectorAll('.atmo').forEach(el => {
    el.style.transform = `translate(${(Math.random()-.5)*50}px, ${(Math.random()-.5)*50}px)`;
    el.style.opacity = 0.04 + Math.random() * 0.06;
  });
  if (gNode) {
    const base = G.bigscreen ? BS.big.outer : BS.normal.outer;
    gNode.selectAll('.n-outer')
      .transition().duration(3000 + Math.random()*2000).ease(d3.easeSinInOut)
      .attr('r', base - 2 + Math.random()*4).attr('opacity', 0.18 + Math.random()*0.15)
      .transition().duration(3000)
      .attr('r', base).attr('opacity', G.bigscreen ? 0.45 : 0.3);
  }
}, 5000);

// ─── Session persistence ───
const SAVE_KEY = 'livemind_session';

function saveSession() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      v: 3, ts: Date.now(), topic: G.topic,
      sessionId: G.sessionId, lastSeq: G.lastSeq,
      txt: G.txt, sent: G.sent, cmap: G.cmap, ci: G.ci,
      summary: G.summary || '',
      nodes: G.nodes.map(n => ({id:n.id, label:n.label, group:n.group, pinned:n.pinned})),
      edges: G.edges.map(e => ({
        source: typeof e.source === 'object' ? e.source.id : e.source,
        target: typeof e.target === 'object' ? e.target.id : e.target,
        label: e.label,
      })),
    }));
  } catch(e) { console.warn('Session save failed:', e); }
}

// ─── Init ───
// Display is passive — auto-connect on load, wait for session from server
(function init() {
  initViz();
  document.getElementById('app').classList.add('on');

  connectWS();
  setInterval(analyze, C.interval);
  setInterval(saveSession, 60000);
})();

function onSessionActive() {
  // Called when we receive a session (via restore or session_reset)
  document.getElementById('waiting').classList.add('gone');
}

function onSessionEnded() {
  // Called when session ends — show waiting state again
  document.getElementById('waiting').classList.remove('gone');
  clearLocalState();
}
</script>
