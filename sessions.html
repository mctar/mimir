<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mímir — Sessions</title>
<link rel="icon" type="image/svg+xml" href="/mimir-favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="/marked.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Ubuntu+Mono:wght@400;500&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #080c18;
  --panel: #0d1124;
  --card: rgba(255,255,255,0.04);
  --bdr: rgba(255,255,255,0.08);
  --txt: #c8ccd8;
  --dim: #5a6a80;
  --bright: #f0f4f8;
  /* Capgemini Brand */
  --color-brand-blue: #0058AB;
  --color-brand-dark: #121A38;
  --color-brand-light: #1DB8F2;
  --color-white: #FFFFFF;
  --color-acc-turquoise: #00D5D0;
  --color-acc-yellow: #FEB100;
  --color-acc-orange: #FF816E;
  --color-acc-lilac: #D4D3F1;
  --color-acc-teal: #00828E;
  --color-acc-terracotta: #BE4D00;
  --color-acc-red: #8F3237;
  --color-acc-purple: #71609E;
  --capgemini-gradient: linear-gradient(90deg, #121A38 0%, #0058AB 30%, #1DB8F2 70%, #00D5D0 100%);
  /* Semantic aliases */
  --green: #1DB8F2;
  --amber: #FEB100;
  --rose: #FF816E;
  --purple: #71609E;
  --blue: #0058AB;
  --cyan: #00D5D0;
}

body {
  background: var(--bg);
  color: var(--txt);
  font-family: 'Ubuntu', Verdana, sans-serif;
  font-size: 14px;
  line-height: 1.6;
  padding: 32px;
  min-height: 100vh;
}

/* ─── Nav bar ─── */
.admin-nav {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: none;
  position: relative;
}
.admin-nav::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: var(--capgemini-gradient);
}
.nav-brand {
  font-family: 'Ubuntu Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--green);
}
.nav-tabs {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.nav-tab {
  font-family: 'Ubuntu Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--dim);
  text-decoration: none;
  padding: 7px 16px;
  border: 1px solid var(--bdr);
  border-radius: 100px;
  transition: all .2s;
}
.nav-tab:hover { border-color: var(--green); color: var(--green); }
.nav-tab.active { border-color: var(--green); color: var(--green); background: rgba(29,184,242,0.06); }

/* ─── Page header ─── */
h1 {
  font-family: 'Ubuntu', Verdana, sans-serif;
  font-weight: 300;
  font-size: 28px;
  color: var(--bright);
  margin-bottom: 24px;
}

/* ─── Session list ─── */
.session-table {
  width: 100%;
  border-collapse: collapse;
}
.session-table th {
  font-family: 'Ubuntu Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--dim);
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1px solid var(--bdr);
}
.session-table td {
  padding: 12px;
  border-bottom: 1px solid var(--bdr);
  font-size: 14px;
  vertical-align: middle;
}
.session-table tr.clickable {
  cursor: pointer;
  transition: background .15s;
}
.session-table tr.clickable:hover {
  background: var(--card);
}
.session-topic {
  color: var(--bright);
  font-weight: 500;
}
.session-id-cell {
  font-family: 'Ubuntu Mono', monospace;
  font-size: 12px;
  color: var(--dim);
}
.session-date {
  font-family: 'Ubuntu Mono', monospace;
  font-size: 12px;
}
.badge {
  display: inline-block;
  font-family: 'Ubuntu Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 100px;
  border: 1px solid;
}
.badge-recap { border-color: var(--green); color: var(--green); }
.badge-none { border-color: var(--bdr); color: var(--dim); }
.badge-active { border-color: var(--amber); color: var(--amber); }
.badge-replay { border-color: var(--cyan, #5af); color: var(--cyan, #5af); }
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--dim);
  font-size: 14px;
}

/* ─── Detail view ─── */
#detail-view { display: none; }

.detail-back {
  font-family: 'Ubuntu Mono', monospace;
  font-size: 12px;
  color: var(--dim);
  text-decoration: none;
  cursor: pointer;
  transition: color .2s;
  display: inline-block;
  margin-bottom: 16px;
}
.detail-back:hover { color: var(--green); }

.detail-header {
  margin-bottom: 24px;
}
.detail-header h2 {
  font-weight: 500;
  font-size: 24px;
  color: var(--bright);
  margin-bottom: 8px;
}
.detail-meta {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
}
.detail-meta .meta-item {
  font-family: 'Ubuntu Mono', monospace;
  font-size: 12px;
  color: var(--dim);
}
.detail-meta .meta-item span {
  color: var(--txt);
}

/* ─── Tabs ─── */
.tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--bdr);
}
.tab-btn {
  font-family: 'Ubuntu Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--dim);
  background: none;
  border: none;
  padding: 12px 20px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .2s;
  margin-bottom: -1px;
}
.tab-btn:hover { color: var(--txt); }
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ─── Recap tab ─── */
.recap-section {
  margin-bottom: 32px;
}
.recap-section h3 {
  font-family: 'Ubuntu Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--green);
  margin-bottom: 12px;
}
.recap-section p {
  margin-bottom: 12px;
  line-height: 1.7;
  font-size: 14px;
}
.recap-section ul {
  margin-left: 20px;
  margin-bottom: 8px;
}
.recap-section li {
  margin-bottom: 8px;
  line-height: 1.6;
  font-size: 14px;
}

/* ─── Recap v2 ─── */
.recap-pitch {
  font-size: 19px;
  font-weight: 400;
  line-height: 1.6;
  color: var(--bright);
  margin-bottom: 32px;
  padding: 20px 0;
  border-bottom: 1px solid var(--bdr);
}
.recap-retain {
  margin-bottom: 32px;
}
.recap-retain ol {
  margin-left: 20px;
  counter-reset: none;
}
.recap-retain li {
  margin-bottom: 10px;
  line-height: 1.6;
  font-size: 15px;
  color: var(--txt);
}
.recap-conn-card {
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 10px;
}
.recap-conn-topics {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}
.recap-conn-chip {
  font-family: 'Ubuntu Mono', monospace;
  font-size: 11px;
  padding: 4px 10px;
  background: rgba(29,184,242,0.08);
  border: 1px solid rgba(29,184,242,0.2);
  border-radius: 4px;
  color: var(--green);
}
.recap-conn-arrow {
  color: var(--dim);
  font-size: 10px;
}
/* ─── Recap inline edit ─── */
.recap-edit-btn {
  background: none;
  border: none;
  color: var(--dim);
  cursor: pointer;
  font-size: 14px;
  padding: 0 6px;
  opacity: 0.6;
  transition: opacity .15s, color .15s;
  vertical-align: middle;
}
.recap-edit-btn:hover { opacity: 1; color: var(--green); }
.recap-edit-textarea {
  width: 100%;
  min-height: 80px;
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 6px;
  color: inherit;
  font-family: inherit;
  font-size: inherit;
  padding: 10px;
  resize: vertical;
  box-sizing: border-box;
}
.recap-edit-textarea:focus { border-color: var(--green); outline: none; }
.recap-edit-input {
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 4px;
  color: inherit;
  font-family: inherit;
  font-size: inherit;
  padding: 4px 8px;
  width: calc(100% - 36px);
}
.recap-edit-input:focus { border-color: var(--green); outline: none; }
.recap-edit-del {
  background: none;
  border: none;
  color: var(--dim);
  cursor: pointer;
  font-size: 16px;
  padding: 0 4px;
  vertical-align: middle;
}
.recap-edit-del:hover { color: var(--rose); }
.recap-edit-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
}
.btn-sm {
  font-size: 9px;
  padding: 5px 12px;
}
.recap-edit-error {
  color: var(--rose);
  font-family: 'Ubuntu Mono', monospace;
  font-size: 11px;
}
.recap-edited-badge {
  font-family: 'Ubuntu Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--green);
  margin-left: 8px;
  vertical-align: middle;
}
.recap-conn-insight {
  font-size: 14px;
  line-height: 1.6;
  color: var(--txt);
}
.recap-empty-note {
  font-size: 12px;
  color: var(--dim);
  font-style: italic;
}
.recap-details {
  margin-bottom: 16px;
}
.recap-details summary {
  font-family: 'Ubuntu Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--green);
  cursor: pointer;
  padding: 10px 0;
  list-style: none;
}
.recap-details summary::before {
  content: '▸ ';
}
.recap-details[open] summary::before {
  content: '▾ ';
}
.recap-details .recap-section {
  margin-top: 12px;
}
.recap-empty {
  text-align: center;
  padding: 60px 20px;
}
.recap-empty p {
  color: var(--dim);
  margin-bottom: 20px;
  font-size: 14px;
}

/* ─── Buttons ─── */
.btn {
  font-family: 'Ubuntu Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 8px 20px;
  border-radius: 6px;
  cursor: pointer;
  transition: all .2s;
  border: 1px solid;
}
.btn-primary {
  background: rgba(29,184,242,0.08);
  border-color: var(--green);
  color: var(--green);
}
.btn-primary:hover { background: rgba(29,184,242,0.15); }
.btn-primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.btn-ghost {
  background: none;
  border-color: var(--bdr);
  color: var(--dim);
}
.btn-ghost:hover { border-color: var(--txt); color: var(--txt); }

.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid var(--bdr);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Transcript tab ─── */
.transcript-toolbar {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 12px;
}
.toggle-raw {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Ubuntu Mono', monospace;
  font-size: 11px;
  color: var(--dim);
  cursor: pointer;
}
.toggle-raw input {
  accent-color: var(--green);
}
.seg-changed {
  border-left: 2px solid var(--green);
  padding-left: 10px;
  animation: seg-highlight 2s ease;
}
@keyframes seg-highlight {
  0% { background: rgba(29,184,242,0.1); }
  100% { background: transparent; }
}
.seg-original {
  font-size: 11px;
  color: var(--dim);
  margin-top: 4px;
  font-style: italic;
}
.transcript-box {
  max-height: 70vh;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--dim) transparent;
  padding-right: 8px;
}
.transcript-seg {
  display: flex;
  gap: 12px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.02);
}
.transcript-ts {
  font-family: 'Ubuntu Mono', monospace;
  font-size: 11px;
  color: var(--dim);
  flex-shrink: 0;
  width: 60px;
  padding-top: 2px;
}
.transcript-text {
  font-size: 14px;
  line-height: 1.7;
}
.seg-meta {
  display: flex;
  gap: 6px;
  margin-top: 3px;
}
.seg-meta span {
  font-size: 10px;
  font-family: 'Ubuntu Mono', monospace;
  padding: 2px 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.05);
  color: var(--dim);
}
.seg-lang {
  text-transform: uppercase;
}

/* ─── Mind Map tab ─── */
.map-wrap {
  width: 100%;
  height: 500px;
  border: 1px solid var(--bdr);
  border-radius: 8px;
  overflow: hidden;
  background: var(--panel);
  position: relative;
}
.map-wrap svg { width: 100%; height: 100%; display: block; }
.map-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--dim);
  font-size: 13px;
}

/* D3 node styles */
.n-group { cursor: default; }
.n-outer { fill: none; stroke-width: 1.5; opacity: 0.5; }
.n-inner { opacity: 0.15; }
.n-dot { opacity: 0.9; }
.n-label {
  fill: var(--bright);
  font-family: 'Ubuntu', Verdana, sans-serif;
  font-size: 11px;
  font-weight: 500;
  text-anchor: middle;
  pointer-events: none;
}
.n-cat {
  fill: var(--dim);
  font-family: 'Ubuntu Mono', monospace;
  font-size: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
  text-anchor: middle;
  pointer-events: none;
}
.edge-path {
  fill: none;
  stroke: var(--bdr);
  stroke-width: 1;
  opacity: 0.5;
}
.edge-text {
  fill: var(--dim);
  font-family: 'Ubuntu Mono', monospace;
  font-size: 8px;
  text-anchor: middle;
  pointer-events: none;
}
.n-group.pinned .n-outer { stroke-width: 2.5; opacity: 0.8; }

/* ─── Playback controls ─── */
.pb-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--panel);
  border: 1px solid var(--bdr);
  border-top: none;
  border-radius: 0 0 8px 8px;
}
.pb-play {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--bdr);
  background: none;
  color: var(--dim);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
  flex-shrink: 0;
}
.pb-play:hover { border-color: var(--green); color: var(--green); }
.pb-play.playing { border-color: var(--green); color: var(--green); background: rgba(29,184,242,0.08); }
.pb-time {
  font-family: 'Ubuntu Mono', monospace;
  font-size: 11px;
  color: var(--txt);
  flex-shrink: 0;
  min-width: 100px;
}
.pb-track {
  flex: 1;
  height: 20px;
  position: relative;
  cursor: pointer;
  display: flex;
  align-items: center;
}
.pb-track-bg {
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--bdr);
  transform: translateY(-50%);
  border-radius: 1px;
}
.pb-track-fill {
  position: absolute;
  top: 50%;
  left: 0;
  height: 2px;
  background: var(--green);
  transform: translateY(-50%);
  border-radius: 1px;
  width: 0%;
}
.pb-track-handle {
  position: absolute;
  top: 50%;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--green);
  transform: translate(-50%, -50%);
  left: 0%;
  transition: box-shadow .2s;
}
.pb-track:hover .pb-track-handle { box-shadow: 0 0 8px rgba(29,184,242,0.4); }
.pb-frame {
  font-family: 'Ubuntu Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  flex-shrink: 0;
}
.pb-speed {
  font-family: 'Ubuntu Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.5px;
  color: var(--dim);
  background: none;
  border: 1px solid var(--bdr);
  border-radius: 100px;
  padding: 4px 10px;
  cursor: pointer;
  transition: all .2s;
  flex-shrink: 0;
}
.pb-speed:hover { border-color: var(--green); color: var(--green); }

.map-play-btn {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
}
.map-export-bar {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 5;
  display: flex;
  gap: 6px;
}
.map-export-bar .btn {
  font-size: 11px;
  padding: 5px 12px;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.map-export-bar .btn:hover { opacity: 1; }
.map-export-bar .btn.exporting {
  pointer-events: none;
  opacity: 0.4;
}
.map-wrap.playback { border-radius: 8px 8px 0 0; }

#tab-mindmap.fullscreen {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: var(--bg);
  display: block;
  padding: 0;
}
#tab-mindmap.fullscreen .map-wrap {
  height: calc(100vh - 50px);
  border-radius: 0;
}
#tab-mindmap.fullscreen .pb-controls {
  border-radius: 0;
}

/* ─── Export bar ─── */
.export-bar {
  display: flex;
  gap: 8px;
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid var(--bdr);
}

/* ─── Toast ─── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  font-family: 'Ubuntu Mono', monospace;
  font-size: 11px;
  padding: 10px 18px;
  border-radius: 6px;
  background: var(--panel);
  border: 1px solid var(--green);
  color: var(--green);
  opacity: 0;
  transform: translateY(10px);
  transition: all .3s;
  pointer-events: none;
  z-index: 100;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { border-color: var(--rose); color: var(--rose); }

/* ─── Multi-select + Synthesis ─── */
.sel-cb {
  width: 16px;
  accent-color: var(--green);
  cursor: pointer;
}
.sel-cb-head {
  width: 16px;
  accent-color: var(--green);
  cursor: pointer;
}

#synth-bar {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--panel);
  border-top: 1px solid var(--green);
  padding: 12px 40px;
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 16px;
  font-family: 'Ubuntu Mono', monospace;
  font-size: 12px;
}
#synth-bar.hidden { display: none; }
#synth-bar .synth-count {
  color: var(--green);
  font-weight: 500;
}
#synth-bar .btn {
  padding: 8px 20px;
}

/* Synthesis cards in list view */
.synth-section {
  margin-bottom: 32px;
}
.synth-section h2 {
  font-family: 'Ubuntu Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--green);
  margin-bottom: 12px;
}
.synth-card {
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color .2s;
}
.synth-card:hover {
  border-color: rgba(29,184,242,0.3);
}
.synth-card-pitch {
  font-size: 14px;
  line-height: 1.6;
  color: var(--txt);
  margin-bottom: 8px;
}
.synth-card-meta {
  font-family: 'Ubuntu Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  display: flex;
  gap: 12px;
  align-items: center;
}
.synth-card-actions {
  margin-left: auto;
}

/* Synthesis detail (expanded) */
.synth-detail {
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 8px;
  padding: 24px;
  margin-bottom: 16px;
}
.synth-detail .recap-pitch {
  border-bottom-color: var(--bdr);
}
.synth-conn-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--bdr);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 8px;
}
.synth-conn-sessions {
  font-family: 'Ubuntu Mono', monospace;
  font-size: 9px;
  color: var(--dim);
  margin-bottom: 4px;
}
/* ─── Q&A Tab ─────────────────────────────────────────────── */
.qa-panel {
  display: flex;
  flex-direction: column;
  height: 70vh;
  min-height: 400px;
}
.qa-badge-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0 12px;
  border-bottom: 1px solid var(--bdr);
}
.qa-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--dim);
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 10px;
  padding: 3px 10px;
}
.qa-badge--active {
  color: #3fb950;
  background: rgba(63,185,80,0.08);
  border-color: rgba(63,185,80,0.3);
}
.qa-badge-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--dim);
  display: inline-block;
  flex-shrink: 0;
}
.qa-badge--active .qa-badge-dot { background: #3fb950; }
.qa-badge-hint { font-size: 11px; color: var(--dim); }
.qa-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 0;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scrollbar-width: thin;
  scrollbar-color: var(--dim) transparent;
}
.qa-empty {
  color: var(--dim);
  font-size: 13px;
  text-align: center;
  margin: auto;
  padding: 40px 20px;
}
.qa-bubble {
  padding: 8px 12px;
  border-radius: 14px;
  font-size: 13px;
  line-height: 1.6;
  max-width: 78%;
  white-space: pre-wrap;
  word-break: break-word;
}
.qa-bubble--user {
  background: var(--color-brand-blue);
  color: white;
  align-self: flex-end;
  border-radius: 14px 14px 3px 14px;
}
.qa-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.qa-avatar {
  width: 22px; height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 3px;
}
.qa-avatar img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}
.qa-bubble--assistant {
  background: var(--panel);
  color: var(--txt);
  border: 1px solid var(--bdr);
  border-radius: 3px 14px 14px 14px;
  white-space: normal;
  max-width: calc(100% - 34px);
}
/* Markdown content resets inside assistant bubbles */
.qa-bubble--assistant p { margin: 0.4em 0; }
.qa-bubble--assistant p:first-child { margin-top: 0; }
.qa-bubble--assistant p:last-child { margin-bottom: 0; }
.qa-bubble--assistant ul,
.qa-bubble--assistant ol {
  padding-left: 1.4em;
  margin: 0.4em 0;
}
.qa-bubble--assistant li { margin: 0.2em 0; }
.qa-bubble--assistant h1,.qa-bubble--assistant h2,
.qa-bubble--assistant h3,.qa-bubble--assistant h4 {
  font-size: 0.9em;
  font-weight: 600;
  color: var(--txt-bright, #e8ecf4);
  margin: 0.8em 0 0.3em;
  letter-spacing: 0.01em;
}
.qa-bubble--assistant h1:first-child,
.qa-bubble--assistant h2:first-child,
.qa-bubble--assistant h3:first-child { margin-top: 0; }
.qa-bubble--assistant code {
  background: rgba(255,255,255,0.07);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 0.82em;
  font-family: 'Ubuntu Mono', monospace;
}
.qa-bubble--assistant pre {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--bdr);
  border-radius: 6px;
  padding: 8px 10px;
  margin: 0.5em 0;
  overflow-x: auto;
}
.qa-bubble--assistant pre code {
  background: none;
  padding: 0;
  font-size: 0.8em;
}
.qa-bubble--assistant strong { color: var(--txt-bright, #e8ecf4); }
.qa-bubble--assistant em { color: var(--dim); font-style: italic; }
.qa-bubble--assistant hr {
  border: none;
  border-top: 1px solid var(--bdr);
  margin: 0.6em 0;
}
.qa-actions {
  display: flex;
  justify-content: flex-end;
  padding: 2px 0 6px 30px;
  margin-top: -4px;
}
.qa-copy-btn {
  background: none;
  border: 1px solid var(--bdr);
  border-radius: 4px;
  color: var(--dim);
  cursor: pointer;
  font-size: 11px;
  padding: 2px 7px;
  transition: color 0.15s, border-color 0.15s;
}
.qa-copy-btn:hover {
  color: var(--txt);
  border-color: var(--txt);
}
.qa-input-bar {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  padding: 12px 0 0;
  border-top: 1px solid var(--bdr);
}
.qa-textarea {
  flex: 1;
  background: var(--panel);
  border: 1px solid var(--bdr);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 13px;
  color: var(--txt);
  font-family: inherit;
  resize: none;
  min-height: 36px;
  max-height: 120px;
  outline: none;
  transition: border-color .2s;
}
.qa-textarea:focus { border-color: var(--color-brand-light); }
.qa-send-btn { white-space: nowrap; align-self: flex-end; }

/* ========== LIGHT THEME ========== */
[data-theme="light"] {
  --bg:    #EEF2F7;
  --panel: #FFFFFF;
  --card:  rgba(0, 88, 171, 0.04);
  --bdr:   rgba(0, 88, 171, 0.12);
  --txt:   #2C3E5A;
  --dim:   #7A8A9E;
  --bright:#121A38;
  --green: #0058AB;
}
[data-theme="light"] .transcript-seg { border-bottom-color: rgba(0,0,0,0.06); }
[data-theme="light"] .seg-stt { background: rgba(0,88,171,0.06); }
[data-theme="light"] .synth-conn-card { background: rgba(0,88,171,0.03); }
[data-theme="light"] .nav-tab.active { background: rgba(0,88,171,0.08); }

#theme-toggle {
  background: transparent;
  border: 1px solid var(--bdr);
  border-radius: 4px;
  color: var(--dim);
  cursor: pointer;
  font-family: 'Ubuntu Mono', monospace;
  font-size: 14px;
  line-height: 1;
  padding: 4px 8px;
  transition: all .2s;
  flex-shrink: 0;
  margin-left: 8px;
}
#theme-toggle:hover { border-color: var(--green); color: var(--green); }
</style>
</head>
<body>

<nav class="admin-nav">
  <img src="/mimir-logo-clean.svg" alt="Mímir" style="height:28px;opacity:0.85;">
  <div class="nav-tabs">
    <a href="/sessions" class="nav-tab" id="nav-sessions">Sessions</a>
    <a href="/sessions/archive" class="nav-tab" id="nav-archive">Archive</a>
    <a href="/doc" class="nav-tab">Guide</a>
  </div>

</nav>

<!-- ═══ List View ═══ -->
<div id="list-view">
  <h1 id="page-title">Sessions</h1>

  <!-- Synthesis section -->
  <div id="synth-section" class="synth-section" style="display:none;"></div>

  <table class="session-table">
    <thead>
      <tr>
        <th style="width:30px;"><input type="checkbox" class="sel-cb-head" id="sel-all" onclick="toggleSelectAll(this)"></th>
        <th>Topic</th>
        <th>Date</th>
        <th>Duration</th>

</div>

<!-- Floating synthesis action bar -->
<div id="synth-bar" class="hidden">
  <span class="synth-count" id="synth-count">0 selected</span>

  <button class="btn" id="btn-archive" onclick="archiveSelected()">Archive</button>
  <button class="btn" onclick="clearSelection()">Clear</button>

</div>

<!-- ═══ Detail View ═══ -->
<div id="detail-view">
  <a class="detail-back" onclick="showList()">&larr; All Sessions</a>
  <div class="detail-header">
    <h2 id="detail-title"></h2>
    <div class="detail-meta">

      <div class="meta-item">Duration: <span id="detail-duration"></span></div>
      <div class="meta-item">Segments: <span id="detail-segments"></span></div>

    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="recap">Recap</button>
    <button class="tab-btn" data-tab="transcript">Transcript</button>
    <button class="tab-btn" data-tab="mindmap">Graph</button>
    <button class="tab-btn" data-tab="qa">Q&amp;A</button>
  </div>

  <!-- Recap Tab -->
  <div id="tab-recap" class="tab-panel active">
    <div class="transcript-toolbar" id="recap-toolbar" style="display:none;">
      <button class="btn btn-ghost" onclick="generateRecap()" id="btn-regenerate">Regenerate Recap</button>
      <button class="btn btn-ghost" onclick="exportPdf()">Export PDF</button>
      <button class="btn btn-ghost" onclick="exportGraph('slides')">Export Slides</button>
      <button class="btn btn-ghost" onclick="copyMarkdown()">Copy Markdown</button>
      <button class="btn btn-ghost" onclick="downloadMarkdown()">Download .md</button>
      <span id="recap-edited-badge" class="recap-edited-badge" style="display:none;">✎ EDITED</span>
    </div>
    <div id="recap-content"></div>
    <div id="recap-empty" class="recap-empty" style="display:none;">

    </div>

  <!-- Transcript Tab -->
  <div id="tab-transcript" class="tab-panel">

      <button class="btn btn-ghost" id="btn-clean-transcript" onclick="cleanTranscript()">Clean Transcript</button>
      <button class="btn btn-ghost" onclick="copyTranscriptMarkdown()">Copy Markdown</button>
      <button class="btn btn-ghost" onclick="downloadTranscriptMarkdown()">Download .md</button>
      <button class="btn btn-ghost" onclick="exportTranscriptPdf()">Export PDF</button>
      <label class="toggle-raw" id="toggle-raw-wrap" style="display:none;">

  <!-- Mind Map Tab -->
  <div id="tab-mindmap" class="tab-panel">

    <div class="pb-controls" id="pb-controls" style="display:none;">
      <button class="pb-play" id="pb-play" onclick="togglePlayback()" title="Play/Pause">&#9654;</button>
      <span class="pb-time" id="pb-time">00:00 / 00:00</span>
      <div class="pb-track" id="pb-track">
        <div class="pb-track-bg"></div>
        <div class="pb-track-fill" id="pb-fill"></div>
        <div class="pb-track-handle" id="pb-handle"></div>
      </div>
      <span class="pb-frame" id="pb-frame">0 / 0</span>
      <button class="pb-speed" id="pb-speed" onclick="cycleSpeed()" title="Playback speed">5x</button>
      <button class="pb-speed" onclick="toggleGraphFullscreen()" title="Fullscreen">&#x26F6;</button>

  <!-- Q&A Tab -->
  <div id="tab-qa" class="tab-panel">
    <div class="qa-panel">
      <div class="qa-messages" id="qa-messages">
        <div class="qa-empty">Posez une question sur cette session.</div>
      </div>
      <div class="qa-input-bar">
        <textarea id="qa-input" class="qa-textarea" rows="1"
          placeholder="Posez une question sur cette session…"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendQaQuestion();}"></textarea>
        <button id="qa-send" class="btn btn-primary qa-send-btn" onclick="sendQaQuestion()">Envoyer ↵</button>
      </div>
    </div>
  </div>

</div>

<!-- ═══ Synthesis Detail View ═══ -->
<div id="synth-view" style="display:none;">
  <a class="detail-back" onclick="closeSynthView()">&larr; All Sessions</a>
  <div class="detail-header">
    <h2 id="synth-title">Cross-Session Synthesis</h2>
    <div class="detail-meta" id="synth-meta"></div>
  </div>
  <div id="synth-content"></div>

  <div class="export-bar">
    <button class="btn btn-ghost" onclick="deleteSynthesisFromDetail()">Delete Synthesis</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Theme ───
(function() {
  const t = localStorage.getItem('mimir-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-toggle').textContent = t === 'light' ? '☾' : '☀';
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('mimir-theme', next);
    document.getElementById('theme-toggle').textContent = next === 'light' ? '☾' : '☀';
  });
  window.addEventListener('storage', e => {
    if (e.key === 'mimir-theme') {
      const v = e.newValue || 'dark';
      document.documentElement.setAttribute('data-theme', v);
      document.getElementById('theme-toggle').textContent = v === 'light' ? '☾' : '☀';
    }
  });
})();

// ─── State ───
let sessions = [];
let current = null;  // { session, transcript, snapshot, recap }
const isArchivePage = location.pathname.includes('/archive');
const COLORS = ['#1DB8F2','#71609E','#FF816E','#FEB100','#0058AB','#00D5D0','#00828E','#D4D3F1','#BE4D00','#8F3237'];
const cmap = {};
let ci = 0;

// ─── Init ───
// Set active nav tab and page title
document.getElementById(isArchivePage ? 'nav-archive' : 'nav-sessions').classList.add('active');
document.getElementById('page-title').textContent = isArchivePage ? 'Archived Sessions' : 'Sessions';

// Adjust action bar for archive page
if (isArchivePage) {
  document.getElementById('btn-synthesize').style.display = 'none';
  document.getElementById('btn-archive').textContent = 'Unarchive';
  document.getElementById('btn-archive').onclick = unarchiveSelected;
}

loadSessions();

async function loadSessions() {
  try {
    const resp = await fetch('/v1/sessions' + (isArchivePage ? '?archived=true' : ''));
    sessions = await resp.json();
    renderList();
  } catch (e) {
    toast('Failed to load sessions', true);
  }
}

function renderList() {
  const tbody = document.getElementById('session-list');
  const empty = document.getElementById('list-empty');
  if (!sessions.length) { empty.style.display = ''; tbody.innerHTML = ''; return; }
  empty.style.display = 'none';
  tbody.innerHTML = sessions.map(s => {
    const topic = s.topic || 'Untitled';
    const replayBadge = s.source === 'replay' ? ' <span class="badge badge-replay">replay</span>' : '';
    const date = fmtDate(s.created_at);
    const dur = s.ended_at ? fmtDuration(s.ended_at - s.created_at) : '<span class="badge badge-active">active</span>';
    const segs = s.segment_count || 0;
    const recap = s.has_recap ? '<span class="badge badge-recap">recap</span>' : '<span class="badge badge-none">none</span>';
    const checked = selectedSessions.has(s.id) ? 'checked' : '';
    return `<tr class="clickable">
      <td onclick="event.stopPropagation()"><input type="checkbox" class="sel-cb" data-id="${s.id}" data-has-recap="${s.has_recap ? 1 : 0}" ${checked} onchange="onSessionSelect()"></td>
      <td class="session-topic" onclick="openSession('${s.id}')">${esc(topic)}${replayBadge}</td>
      <td class="session-date" onclick="openSession('${s.id}')">${date}</td>
      <td onclick="openSession('${s.id}')">${dur}</td>
      <td onclick="openSession('${s.id}')">${segs}</td>
      <td onclick="openSession('${s.id}')">${recap}</td>
      <td class="session-id-cell" onclick="openSession('${s.id}')">${s.id}</td>
    </tr>`;
  }).join('');
  loadSynthesisRecaps();
}

// ─── Detail ───
async function openSession(id) {
  try {
    const resp = await fetch(`/v1/sessions/${id}`);
    if (!resp.ok) {
      toast(`Session ${id} not found`, true);
      return;
    }
    const data = await resp.json();
    if (!data || !data.session) {
      toast(`Session ${id} has no metadata`, true);
      return;
    }
    current = data;
    renderDetail();
    document.getElementById('list-view').style.display = 'none';
    document.getElementById('synth-view').style.display = 'none';
    document.getElementById('detail-view').style.display = 'block';
  } catch (e) {
    toast('Failed to load session', true);
  }
}

function showList() {
  cleanupPlayback();
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('synth-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
  current = null;
  currentSynthId = null;
}

function renderDetail() {
  const s = current.session;
  document.getElementById('detail-title').textContent = s.topic || 'Untitled Session';
  document.getElementById('detail-date').textContent = fmtDate(s.created_at);
  document.getElementById('detail-duration').textContent = s.ended_at ? fmtDuration(s.ended_at - s.created_at) : 'In progress';
  document.getElementById('detail-segments').textContent = s.segment_count || 0;
  document.getElementById('detail-id').textContent = s.id;

  renderRecap();
  renderTranscript();
  initQaTab();   // reset Q&A history (sync) + load corpus badge in background (async)
  // Reset to recap tab
  switchTab('recap');
}

// ─── Tabs ───
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

function switchTab(tab) {
  if (tab !== 'mindmap') cleanupPlayback();
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
  if (tab === 'mindmap') renderMindMap();
}

// ─── Q&A Tab ─────────────────────────────────────────────────────────────────
let _qaHistory = [];   // [{role: 'user'|'assistant', content: string}]
let _qaLoading = false;

function initQaTab() {
  _qaHistory = [];
  renderQaHistory();
}

function renderQaHistory() {
  const container = document.getElementById('qa-messages');
  if (!container) return;
  if (_qaHistory.length === 0) {
    container.innerHTML = '<div class="qa-empty">Posez une question sur cette session.</div>';
    return;
  }
  container.innerHTML = _qaHistory.map(msg => {
    if (msg.role === 'user') {
      return `<div class="qa-bubble qa-bubble--user">${escQa(msg.content)}</div>`;
    }
    return `<div class="qa-row"><div class="qa-avatar"><img src="/mimir-favicon.svg" alt="Mímir"></div><div class="qa-bubble qa-bubble--assistant">${marked.parse(msg.content)}</div></div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

function escQa(text) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(text));
  return d.innerHTML;
}

function copyQaBubble(btn) {
  const row = btn.closest('.qa-actions').previousElementSibling;
  const bubble = row ? row.querySelector('.qa-bubble--assistant') : null;
  if (!bubble) return;
  navigator.clipboard.writeText(bubble.innerText).then(
    () => toast('Copié'),
    () => toast('Échec de la copie', true)
  );
}

async function sendQaQuestion() {
  if (_qaLoading || !current) return;
  const input = document.getElementById('qa-input');
  const question = input.value.trim();
  if (!question) return;

  const sessionId = current.session.id;
  input.value = '';
  input.style.height = 'auto';

  _qaHistory.push({ role: 'user', content: question });
  _qaLoading = true;
  document.getElementById('qa-send').disabled = true;
  input.disabled = true;

  // Render user bubble immediately, then add a loading indicator
  renderQaHistory();
  const container = document.getElementById('qa-messages');
  const loadingRow = document.createElement('div');
  loadingRow.className = 'qa-row';
  loadingRow.id = 'qa-loading-row';
  loadingRow.innerHTML = '<div class="qa-avatar"><img src="/mimir-favicon.svg" alt="Mímir"></div><div class="qa-bubble qa-bubble--assistant" style="color:var(--dim);">…</div>';
  container.appendChild(loadingRow);
  container.scrollTop = container.scrollHeight;

  const loadingBubble = loadingRow.querySelector('.qa-bubble--assistant');

  try {
    const resp = await fetch(`/v1/sessions/${sessionId}/qa`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, history: _qaHistory.slice(0, -1), stream: true }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      fullText += decoder.decode(value, { stream: true });
      if (loadingBubble) {
        loadingBubble.style.color = '';
        loadingBubble.innerHTML = marked.parse(fullText);
        container.scrollTop = container.scrollHeight;
      }
    }

    _qaHistory.push({ role: 'assistant', content: fullText });
  } catch {
    _qaHistory.push({ role: 'assistant', content: "Impossible d'obtenir une réponse." });
  } finally {
    _qaLoading = false;
    document.getElementById('qa-send').disabled = false;
    input.disabled = false;
    renderQaHistory();
    input.focus();
  }
}

// ─── Recap inline editing ───
let _editingField = null;
let _editConns = [];   // copy of non_obvious_connections while editing that field

function editBtn(field) {
  return `<button class="recap-edit-btn" onclick="startEdit('${field}')" title="Edit this section">✎</button>`;
}

function editActions() {
  return `<div class="recap-edit-actions">
    <button class="btn btn-primary btn-sm" onclick="saveEdit()">Save</button>
    <button class="btn btn-ghost btn-sm" onclick="cancelEdit()">Cancel</button>
    <span id="edit-error" class="recap-edit-error"></span>
  </div>`;
}

function startEdit(field) {
  _editingField = field;
  if (field === 'non_obvious_connections' && current && current.recap) {
    _editConns = JSON.parse(JSON.stringify(current.recap.recap.non_obvious_connections || []));
  }
  renderRecap();
}

function cancelEdit() {
  _editingField = null;
  renderRecap();
}

function deleteEditConn(idx) {
  _editConns.splice(idx, 1);
  renderRecap();
}

function addEditItem(listId, tag) {
  const list = document.getElementById(listId);
  const el = document.createElement(tag);
  el.innerHTML = `<input type="text" class="recap-edit-input" value=""> <button class="recap-edit-del" onclick="this.closest('${tag}').remove()">×</button>`;
  list.appendChild(el);
  el.querySelector('input').focus();
}

async function saveEdit() {
  if (!_editingField || !current) return;
  const r = Object.assign({}, current.recap.recap);
  const field = _editingField;

  if (field === 'elevator_pitch') {
    r.elevator_pitch = document.getElementById('edit-elevator_pitch').value.trim();
  } else if (field === 'retain') {
    r.retain = Array.from(document.querySelectorAll('#edit-retain input'))
      .map(i => i.value.trim()).filter(v => v);
  } else if (field === 'non_obvious_connections') {
    r.non_obvious_connections = _editConns;
  } else if (field === 'contradictions') {
    r.contradictions = Array.from(document.querySelectorAll('#edit-contradictions input'))
      .map(i => i.value.trim()).filter(v => v);
  } else if (field === 'summary') {
    r.summary = document.getElementById('edit-summary').value.trim();
  } else if (field === 'decisions') {
    r.decisions = Array.from(document.querySelectorAll('#edit-decisions input'))
      .map(i => i.value.trim()).filter(v => v);
  } else if (field === 'open_threads') {
    r.open_threads = Array.from(document.querySelectorAll('#edit-open_threads input'))
      .map(i => i.value.trim()).filter(v => v);
  }

  const errEl = document.getElementById('edit-error');
  const saveBtns = document.querySelectorAll('.recap-edit-actions .btn-primary');
  saveBtns.forEach(b => { b.disabled = true; b.textContent = 'Saving…'; });

  try {
    const resp = await fetch(`/v1/sessions/${current.session.id}/recap`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({recap: r}),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Save failed');
    current.recap = data;
    _editingField = null;
    renderRecap();
    toast('Recap saved');
  } catch (e) {
    if (errEl) errEl.textContent = e.message;
    saveBtns.forEach(b => { b.disabled = false; b.textContent = 'Save'; });
  }
}

// ─── Recap ───
function renderRecap() {
  const container = document.getElementById('recap-content');
  const empty = document.getElementById('recap-empty');
  const btn = document.getElementById('btn-generate');

  if (!current.recap) {
    container.innerHTML = '';
    empty.style.display = '';
    document.getElementById('recap-toolbar').style.display = 'none';
    btn.textContent = 'Generate Recap';
    btn.disabled = false;
    return;
  }

  empty.style.display = 'none';
  document.getElementById('recap-toolbar').style.display = '';
  const badge = document.getElementById('recap-edited-badge');
  if (badge) badge.style.display = (current.recap.model === 'manual') ? '' : 'none';
  const r = current.recap.recap;

  // Check for error state
  if (r.error) {
    container.innerHTML = `<div class="recap-empty"><p style="color:var(--rose);">Recap generation failed: ${esc(r.error)}</p>
      <button class="btn btn-ghost" onclick="generateRecap()">Retry</button></div>`;
    return;
  }

  // Branch on schema version
  const html = (r.schema_version === 2) ? renderRecapV2(r) : renderRecapV1(r);
  container.innerHTML = html;
}

function renderRecapV1(r) {
  let html = '';
  if (r.summary) {
    html += `<div class="recap-section"><h3>Summary</h3>`;
    r.summary.split('\n\n').forEach(p => { html += `<p>${esc(p)}</p>`; });
    html += `</div>`;
  }
  if (r.key_topics && r.key_topics.length) {
    html += `<div class="recap-section"><h3>Key Topics</h3><ul>`;
    r.key_topics.forEach(t => { html += `<li>${esc(t)}</li>`; });
    html += `</ul></div>`;
  }
  if (r.decisions && r.decisions.length) {
    html += `<div class="recap-section"><h3>Decisions</h3><ul>`;
    r.decisions.forEach(d => { html += `<li>${esc(d)}</li>`; });
    html += `</ul></div>`;
  }
  if (r.action_items && r.action_items.length) {
    html += `<div class="recap-section"><h3>Action Items</h3><ul>`;
    r.action_items.forEach(a => { html += `<li>${esc(a)}</li>`; });
    html += `</ul></div>`;
  }
  if (r.open_questions && r.open_questions.length) {
    html += `<div class="recap-section"><h3>Open Questions</h3><ul>`;
    r.open_questions.forEach(q => { html += `<li>${esc(q)}</li>`; });
    html += `</ul></div>`;
  }
  return html;
}

        ${(r.retain || []).map(item => `<li><input type="text" class="recap-edit-input" value="${esc(item)}"> <button class="recap-edit-del" onclick="this.closest('li').remove()">×</button></li>`).join('')}

      r.non_obvious_connections.forEach(conn => {

          <div class="recap-conn-topics">${topics}</div>
          <div class="recap-conn-insight">${esc(conn.insight || '')}</div>
        </div>`;
      });
    } else {
      html += `<p class="recap-empty-note">No non-obvious connections surfaced this session.</p>`;
    }
    html += `</div>`;
  }

  // Contradictions
  if (r.contradictions && r.contradictions.length) {
    if (_editingField === 'contradictions') {
      html += `<div class="recap-section"><h3>Contradictions</h3>
        <ul id="edit-contradictions">
          ${r.contradictions.map(c => `<li><input type="text" class="recap-edit-input" value="${esc(c)}"> <button class="recap-edit-del" onclick="this.closest('li').remove()">×</button></li>`).join('')}
        </ul>

    } else {
      html += `<div class="recap-section">
        <h3>Contradictions ${editBtn('contradictions')}</h3>
        <ul>${r.contradictions.map(c => `<li>${esc(c)}</li>`).join('')}</ul>
      </div>`;
    }
  }

  // Summary (collapsible unless editing)
  if (r.summary) {
    if (_editingField === 'summary') {
      html += `<div class="recap-section">
        <h3>Summary</h3>
        <textarea id="edit-summary" class="recap-edit-textarea">${esc(r.summary)}</textarea>
        ${editActions()}
      </div>`;
    } else {
      html += `<div style="display:flex;align-items:flex-start;gap:8px">
        <details class="recap-details" style="flex:1">
          <summary>Summary</summary>
          <div class="recap-section">
            ${r.summary.split('\n\n').map(p => `<p>${esc(p)}</p>`).join('')}
          </div>
        </details>
        ${editBtn('summary')}
      </div>`;

  // Decisions (collapsible unless editing)
  if (r.decisions && r.decisions.length) {
    if (_editingField === 'decisions') {
      html += `<div class="recap-section"><h3>Decisions</h3>
        <ul id="edit-decisions">
          ${r.decisions.map(d => `<li><input type="text" class="recap-edit-input" value="${esc(d)}"> <button class="recap-edit-del" onclick="this.closest('li').remove()">×</button></li>`).join('')}
        </ul>

        ${editActions()}
      </div>`;
    } else {
      html += `<div style="display:flex;align-items:flex-start;gap:8px">
        <details class="recap-details" style="flex:1">
          <summary>Decisions</summary>
          <div class="recap-section">
            <ul>${r.decisions.map(d => `<li>${esc(d)}</li>`).join('')}</ul>
          </div>
        </details>
        ${editBtn('decisions')}
      </div>`;

  // Open threads (collapsible unless editing)
  if (r.open_threads && r.open_threads.length) {
    if (_editingField === 'open_threads') {

        <ul id="edit-open_threads">
          ${r.open_threads.map(t => `<li><input type="text" class="recap-edit-input" value="${esc(t)}"> <button class="recap-edit-del" onclick="this.closest('li').remove()">×</button></li>`).join('')}

        ${editBtn('open_threads')}
