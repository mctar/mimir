  return html;
}

async function generateRecap() {
  if (!current) return;
  const btn = document.getElementById('btn-generate');
  const container = document.getElementById('recap-content');
  const empty = document.getElementById('recap-empty');

  // Show loading state
  const loadingHtml = `<div class="recap-empty"><p><span class="spinner"></span> Generating recap...</p></div>`;
  if (current.recap) {
    container.innerHTML = loadingHtml;
  } else {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Generating...';
  }

  try {
    const resp = await fetch(`/v1/sessions/${current.session.id}/recap`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Failed to generate recap');
    current.recap = data;
    renderRecap();
    toast('Recap generated');
    // Update list badge and session object so map re-renders with Export Slides button
    const s = sessions.find(s => s.id === current.session.id);
    if (s) s.has_recap = 1;
    current.session.has_recap = 1;
    mapRendered = false;  // force map re-render so Export Slides button appears
  } catch (e) {
    toast(e.message, true);
    renderRecap();  // restore previous state
  }
}

// ─── Session Selection + Synthesis ───
const selectedSessions = new Set();
let synthesisRecaps = [];

function toggleSelectAll(cb) {
  document.querySelectorAll('.sel-cb').forEach(el => {
    el.checked = cb.checked;
  });
  onSessionSelect();
}

function onSessionSelect() {
  selectedSessions.clear();
  let missingRecaps = 0;
  document.querySelectorAll('.sel-cb:checked').forEach(el => {
    selectedSessions.add(el.dataset.id);
    if (el.dataset.hasRecap !== '1') missingRecaps++;
  });

  const bar = document.getElementById('synth-bar');
  // Show bar: 1+ for archive/unarchive, 2+ for synthesize on active page
  const minForBar = isArchivePage ? 1 : 1;
  if (selectedSessions.size >= minForBar) {
    bar.classList.remove('hidden');
    document.getElementById('synth-count').textContent = selectedSessions.size + ' selected';
    const btn = document.getElementById('btn-synthesize');
    const warn = document.getElementById('synth-warning');
    if (!isArchivePage && missingRecaps > 0 && selectedSessions.size >= 2) {
      btn.disabled = true;
      btn.style.opacity = '0.4';
      warn.textContent = missingRecaps + ' session(s) missing recaps — generate individual recaps first';
    } else if (!isArchivePage) {
      btn.disabled = selectedSessions.size < 2;
      btn.style.opacity = selectedSessions.size < 2 ? '0.4' : '';
      warn.textContent = selectedSessions.size < 2 ? 'Select 2+ sessions to synthesize' : '';
    }
  } else {
    bar.classList.add('hidden');
  }
}

function clearSelection() {
  selectedSessions.clear();
  document.querySelectorAll('.sel-cb').forEach(el => { el.checked = false; });
  document.getElementById('sel-all').checked = false;
  document.getElementById('synth-bar').classList.add('hidden');
}

async function archiveSelected() {
  const ids = Array.from(selectedSessions);
  if (!ids.length) return;
  try {
    const resp = await fetch('/v1/sessions/archive', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({session_ids: ids}),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Archive failed');
    toast(`${ids.length} session(s) archived`);
    clearSelection();
    loadSessions();
  } catch (e) {
    toast(e.message, true);
  }
}

async function unarchiveSelected() {
  const ids = Array.from(selectedSessions);
  if (!ids.length) return;
  try {
    const resp = await fetch('/v1/sessions/unarchive', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({session_ids: ids}),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Unarchive failed');
    toast(`${ids.length} session(s) restored`);
    clearSelection();
    loadSessions();
  } catch (e) {
    toast(e.message, true);
  }
}

let currentSynthId = null;

async function generateSynthesis() {
  const ids = Array.from(selectedSessions);
  const btn = document.getElementById('btn-synthesize');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Synthesizing...';

  try {
    const resp = await fetch('/v1/sessions/synthesis', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({session_ids: ids}),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Synthesis failed');
    toast('Cross-session synthesis generated');
    clearSelection();
    // Navigate directly to the result
    openSynthView(data);
  } catch (e) {
    toast(e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Synthesize';
  }
}

async function loadSynthesisRecaps() {
  try {
    const resp = await fetch('/v1/sessions/synthesis');
    synthesisRecaps = await resp.json();
    renderSynthesisSection();
  } catch (e) {
    console.warn('Failed to load synthesis recaps:', e);
  }
}

function renderSynthesisSection() {
  const section = document.getElementById('synth-section');
  if (!synthesisRecaps.length) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';
  let html = '<h2>Cross-Session Synthesis</h2>';
  synthesisRecaps.forEach(sr => {
    const r = sr.recap;
    const pitch = r.elevator_pitch || (r.synthesis ? r.synthesis.substring(0, 120) + '...' : 'No pitch');
    const count = sr.session_ids.length;
    const date = fmtDate(sr.created_at);
    html += `<div class="synth-card" onclick="openSynthById(${sr.id})">
      <div class="synth-card-pitch">${esc(pitch)}</div>
      <div class="synth-card-meta">
        <span>${count} sessions</span>
        <span>${date}</span>
        <span>${sr.model || ''}</span>
      </div>
    </div>`;
  });
  section.innerHTML = html;
}

async function openSynthById(id) {
  // Load from API if not already in memory
  let sr = synthesisRecaps.find(s => s.id === id);
  if (!sr) {
    try {
      const resp = await fetch('/v1/sessions/synthesis/' + id);
      sr = await resp.json();
    } catch (e) {
      toast('Failed to load synthesis', true);
      return;
    }
  }
  openSynthView(sr);
}

function openSynthView(sr) {
  currentSynthId = sr.id;
  const r = sr.recap;

  // Build session lookup
  const sessionMap = {};
  sessions.forEach(s => { sessionMap[s.id] = s.topic || s.id; });

  // Meta
  const count = sr.session_ids.length;
  const sessionNames = sr.session_ids.map(sid => sessionMap[sid] || sid).join(', ');
  document.getElementById('synth-meta').innerHTML = `
    <div class="meta-item">${count} sessions</div>
    <div class="meta-item">${fmtDate(sr.created_at)}</div>
    <div class="meta-item">${sr.model || ''}</div>
  `;

  let html = '';

  // Elevator pitch
  if (r.elevator_pitch) {
    html += `<div class="recap-pitch">${esc(r.elevator_pitch)}</div>`;
  }

  // Cross-connections
  html += `<div class="recap-section"><h3>Cross-Session Connections</h3>`;
  if (r.cross_connections && r.cross_connections.length) {
    r.cross_connections.forEach(conn => {
      const connSessions = (conn.sessions || []).map(sid => esc(sessionMap[sid] || sid)).join(', ');
      const topics = (conn.topics || []).map(t => `<span class="recap-conn-chip">${esc(t)}</span>`).join('<span class="recap-conn-arrow">&harr;</span>');
      html += `<div class="synth-conn-card">
        <div class="synth-conn-sessions">Sessions: ${connSessions}</div>
        <div class="recap-conn-topics" style="margin-bottom:6px;">${topics}</div>
        <div class="recap-conn-insight">${esc(conn.insight || '')}</div>
      </div>`;
    });
  } else {
    html += `<p class="recap-empty-note">No cross-session connections surfaced.</p>`;
  }
  html += `</div>`;

  // Evolution
  if (r.evolution && r.evolution.length) {
    html += `<div class="recap-section"><h3>How Ideas Evolved</h3><ol>`;
    r.evolution.forEach(item => { html += `<li>${esc(item)}</li>`; });
    html += `</ol></div>`;
  }

  // Tensions
  if (r.tensions && r.tensions.length) {
    html += `<div class="recap-section"><h3>Tensions</h3><ul>`;
    r.tensions.forEach(t => { html += `<li>${esc(t)}</li>`; });
    html += `</ul></div>`;
  }

  // Narrative
  if (r.synthesis) {
    html += `<div class="recap-section"><h3>Full Narrative</h3>`;
    r.synthesis.split('\n\n').forEach(p => { html += `<p>${esc(p)}</p>`; });
    html += `</div>`;
  }

  // Sessions included
  html += `<div class="recap-section"><h3>Sessions Included</h3><div>`;
  sr.session_ids.forEach(sid => {
    const name = sessionMap[sid] || sid;
    html += `<span style="display:inline-block;font-size:12px;padding:4px 10px;margin:3px 4px 3px 0;background:var(--card);border:1px solid var(--bdr);border-radius:4px;cursor:pointer;" onclick="closeSynthView();openSession('${sid}')">${esc(name)}</span>`;
  });
  html += `</div></div>`;

  document.getElementById('synth-content').innerHTML = html;

  // Show synth view, hide list
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('synth-view').style.display = 'block';
}

function closeSynthView() {
  currentSynthId = null;
  document.getElementById('synth-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
  loadSynthesisRecaps();
}

async function deleteSynthesisFromDetail() {
  if (!currentSynthId) return;
  if (!confirm('Delete this synthesis?')) return;
  try {
    await fetch('/v1/sessions/synthesis/' + currentSynthId, {method: 'DELETE'});
    toast('Synthesis deleted');
    closeSynthView();
  } catch (e) {
    toast('Delete failed', true);
  }
}

// ─── Transcript ───
function renderTranscript() {
  const box = document.getElementById('transcript-box');
  if (!current.transcript || !current.transcript.length) {
    box.innerHTML = '<div class="empty-state">No transcript segments.</div>';
    return;
  }

  const hasCleaned = current.transcript.some(seg => seg.cleaned_text);
  const showRaw = document.getElementById('toggle-raw')?.checked || false;

  // Show/hide toggle and update button state
  document.getElementById('toggle-raw-wrap').style.display = hasCleaned ? '' : 'none';
  const cleanBtn = document.getElementById('btn-clean-transcript');
  if (hasCleaned) {
    cleanBtn.textContent = 'Re-clean Transcript';
  }

  const t0 = current.transcript[0].timestamp;
  box.innerHTML = current.transcript.map(seg => {
    const offset = seg.timestamp - t0;
    const lang = seg.stt_language ? `<span class="seg-lang">${esc(seg.stt_language)}</span>` : '';
    const backend = seg.stt_backend ? `<span class="seg-backend">${esc(seg.stt_backend)}</span>` : '';
    const latency = seg.stt_latency_ms != null ? `<span class="seg-latency">${seg.stt_latency_ms}ms</span>` : '';
    const meta = (lang || backend || latency) ? `<div class="seg-meta">${lang}${backend}${latency}</div>` : '';

    // Decide which text to show
    const displayText = (!showRaw && seg.cleaned_text) ? seg.cleaned_text : seg.text;
    const changed = seg.cleaned_text && seg.cleaned_text !== seg.text;
    const changedClass = (!showRaw && changed) ? ' seg-changed' : '';

    // Show original below if showing cleaned and it differs
    const originalLine = (!showRaw && changed) ? `<div class="seg-original">${esc(seg.text)}</div>` : '';

    return `<div class="transcript-seg${changedClass}">
      <div class="transcript-ts">${fmtTime(offset)}</div>
      <div class="transcript-text">${esc(displayText)}${originalLine}${meta}</div>
    </div>`;
  }).join('');
}

async function cleanTranscript() {
  if (!current) return;
  const sid = current.session.id;
  const btn = document.getElementById('btn-clean-transcript');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Cleaning...';

  const setBtn = (label) => { btn.innerHTML = '<span class="spinner"></span> ' + label; };

  try {
    // Kick off the job (returns 202 immediately)
    const start = await fetch(`/v1/sessions/${sid}/clean-transcript`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
    });
    if (!start.ok && start.status !== 202) {
      const err = await start.json().catch(() => ({}));
      throw new Error(err.error || `Failed to start (HTTP ${start.status})`);
    }

    // Poll status every 2s until done or error
    let result = null;
    while (true) {
      await new Promise(r => setTimeout(r, 2000));
      const s = await fetch(`/v1/sessions/${sid}/clean-transcript/status`);
      if (!s.ok) throw new Error(`Status poll failed (HTTP ${s.status})`);
      const js = await s.json();
      if (js.status === 'running') {
        const p = js.progress || {};
        if (p.total) setBtn(`Cleaning ${p.done || 0}/${p.total}...`);
      } else if (js.status === 'done') {
        result = js.result || {};
        break;
      } else if (js.status === 'error') {
        throw new Error(js.error || 'Cleaning job crashed');
      } else if (js.status === 'idle') {
        throw new Error('Cleaning job disappeared');
      }
    }

    const failN = (result.failed_chunks || []).length;
    const base = `Transcript cleaned: ${result.changed} of ${result.total_segments} segments updated`;
    toast(failN ? `${base} (${failN} chunks skipped)` : base);

    // Reload session data to get cleaned_text
    const resp2 = await fetch(`/v1/sessions/${sid}`);
    current = await resp2.json();
    switchTab('transcript');
    renderTranscript();
    const firstChanged = document.querySelector('.seg-changed');
    if (firstChanged) firstChanged.scrollIntoView({behavior: 'smooth', block: 'center'});
  } catch (e) {
    toast(e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Re-clean Transcript';
  }
}

// ─── Mind Map ───
let mapRendered = false;

function renderMindMap() {
  if (mapRendered || PB.active) return;
  const wrap = document.getElementById('map-wrap');

  if (!current.snapshot || !current.snapshot.graph) {
    wrap.innerHTML = '<div class="map-empty">No graph snapshot available.</div>';
    return;
  }

  const graph = current.snapshot.graph;
  const nodesDict = graph.nodes || {};
  const rawEdges = graph.edges || [];

  const activeNodes = Object.values(nodesDict)
    .filter(n => n.state === 'active')
    .map(n => ({
      id: n.id, label: n.label, group: n.group,
      importance: n.importance || 0.5, pinned: n.pinned || false,
      color: nodeColor(n.group),
    }));

  if (!activeNodes.length) {
    wrap.innerHTML = '<div class="map-empty">No active nodes in final snapshot.</div>';
    return;
  }

  const activeIds = new Set(activeNodes.map(n => n.id));
  const edges = rawEdges
    .filter(e => activeIds.has(e.source) && activeIds.has(e.target))
    .map(e => ({ source: e.source, target: e.target, label: e.label || '' }));

  wrap.innerHTML = '';
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const svg = d3.select(wrap).append('svg').attr('width', W).attr('height', H);

  const defs = svg.append('defs');
  const glow = defs.append('filter').attr('id','glow-s');
  glow.append('feGaussianBlur').attr('stdDeviation','3');
  const halo = defs.append('filter').attr('id','halo-s')
    .attr('x','-200%').attr('y','-200%').attr('width','500%').attr('height','500%');
  halo.append('feGaussianBlur').attr('stdDeviation','30');

  const gEdge = svg.append('g'), gNode = svg.append('g');

  const sim = d3.forceSimulation(activeNodes)
    .force('link', d3.forceLink(edges).id(d => d.id).distance(180).strength(0.3))
    .force('charge', d3.forceManyBody().strength(-600).distanceMax(500))
    .force('center', d3.forceCenter(W/2, H/2).strength(0.05))
    .force('collide', d3.forceCollide().radius(65).strength(0.8))
    .force('x', d3.forceX(W/2).strength(0.02))
    .force('y', d3.forceY(H/2).strength(0.02))
    .stop();
  for (let i = 0; i < 300; i++) sim.tick();

  const eSel = gEdge.selectAll('.e-group').data(edges).enter().append('g').attr('class','e-group');
  eSel.append('path').attr('class','edge-path').attr('d', d => {
    const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
    const dr = Math.sqrt(dx*dx + dy*dy) * 1.5;
    return `M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
  });
  eSel.append('text').attr('class','edge-text')
    .attr('x', d => (d.source.x + d.target.x)/2 + (d.target.y - d.source.y)*0.06)
    .attr('y', d => (d.source.y + d.target.y)/2 - (d.target.x - d.source.x)*0.06)
    .text(d => d.label);

  const nSel = gNode.selectAll('.n-group').data(activeNodes).enter().append('g')
    .attr('class', d => 'n-group' + (d.pinned ? ' pinned' : ''))
    .attr('transform', d => `translate(${d.x},${d.y})`);
  nSel.append('circle').attr('class','n-aura').attr('r',32).attr('fill',d=>d.color).attr('filter','url(#halo-s)');
  nSel.append('circle').attr('class','n-outer').attr('r',22).attr('stroke',d=>d.color);
  nSel.append('circle').attr('class','n-inner').attr('r',18).attr('fill',d=>d.color);
  nSel.append('circle').attr('class','n-dot').attr('r',4).attr('fill',d=>d.color).attr('filter','url(#glow-s)');
  nSel.append('text').attr('class','n-label').attr('dy',36).text(d=>d.label);
  nSel.append('text').attr('class','n-cat').attr('dy',48).text(d=>d.group);

  // Add Play Session button if session has snapshots
  if (current.session.snapshot_count > 1) {
    const btn = document.createElement('button');
    btn.className = 'btn btn-primary map-play-btn';
    btn.textContent = 'Play Session';
    btn.onclick = () => initPlayback();
    wrap.appendChild(btn);
  }

  // Export buttons
  const exportBar = document.createElement('div');
  exportBar.className = 'map-export-bar';
  exportBar.innerHTML = `
    <button class="btn btn-ghost" onclick="exportGraph('pdf')">Export PDF</button>
    <button class="btn btn-ghost" onclick="exportGraph('video')">Export Video</button>
    ${current && current.session.has_recap ? `<button class="btn btn-ghost" onclick="exportGraph('slides')">Export Slides</button>` : ''}
  `;
  wrap.appendChild(exportBar);

  mapRendered = true;
}

function nodeColor(group) {
  if (!cmap[group]) cmap[group] = COLORS[ci++ % COLORS.length];
  return cmap[group];
}

// ─── Playback Engine ───
const SPEEDS = [2, 5, 10, 20];
const PB = {
  active: false,
  frames: [],
  idx: 0,
  playing: false,
  speed: 5,
  speedIdx: 1,
  sessionStart: 0,
  sessionEnd: 0,
  elapsed: 0,
  lastTick: 0,
  rafId: null,
  sim: null,
  positions: {},
  cmap: {},
  ci: 0,
  gEdge: null,
  gNode: null,
  W: 0,
  H: 0,
};

async function initPlayback() {
  if (!current) return;
  const wrap = document.getElementById('map-wrap');

  // Show loading
  wrap.innerHTML = '<div class="map-empty"><span class="spinner"></span> Loading snapshots...</div>';

  try {
    const resp = await fetch(`/v1/sessions/${current.session.id}/snapshots`);
    const data = await resp.json();
    if (!data.snapshots || data.snapshots.length < 2) {
      wrap.innerHTML = '<div class="map-empty">Not enough snapshots for playback.</div>';
      return;
    }

    PB.frames = data.snapshots;
    PB.idx = 0;
    PB.playing = false;
    PB.elapsed = 0;
    PB.positions = {};
    PB.cmap = {};
    PB.ci = 0;
    PB.active = true;
    PB.sessionStart = PB.frames[0].created_at;
    PB.sessionEnd = PB.frames[PB.frames.length - 1].created_at;

    // Setup SVG
    wrap.innerHTML = '';
    wrap.classList.add('playback');
    PB.W = wrap.clientWidth;
    PB.H = wrap.clientHeight;

    const svg = d3.select(wrap).append('svg').attr('width', PB.W).attr('height', PB.H);
    const defs = svg.append('defs');
    const glow = defs.append('filter').attr('id','glow-pb');
    glow.append('feGaussianBlur').attr('stdDeviation','3');
    const halo = defs.append('filter').attr('id','halo-pb')
      .attr('x','-200%').attr('y','-200%').attr('width','500%').attr('height','500%');
    halo.append('feGaussianBlur').attr('stdDeviation','30');

    PB.gEdge = svg.append('g');
    PB.gNode = svg.append('g');

    // Create persistent simulation
    PB.sim = d3.forceSimulation([])
      .force('link', d3.forceLink([]).id(d => d.id).distance(180).strength(0.3))
      .force('charge', d3.forceManyBody().strength(-600).distanceMax(500))
      .force('center', d3.forceCenter(PB.W/2, PB.H/2).strength(0.03))
      .force('collide', d3.forceCollide().radius(65).strength(0.8))
      .force('x', d3.forceX(PB.W/2).strength(0.015))
      .force('y', d3.forceY(PB.H/2).strength(0.015))
      .alphaDecay(0.02)
      .velocityDecay(0.4)
      .on('tick', pbTick);

    // Show controls
    document.getElementById('pb-controls').style.display = 'flex';
    updatePbDisplay();
    setupScrubber();

    // Apply first frame with higher alpha to settle
    applyFrame(0, 0.6);

  } catch (e) {
    wrap.innerHTML = '<div class="map-empty">Failed to load snapshots.</div>';
    toast('Failed to load snapshots', true);
  }
}

function cleanupPlayback() {
  if (!PB.active) return;
  PB.active = false;
  PB.playing = false;
  if (PB.rafId) { cancelAnimationFrame(PB.rafId); PB.rafId = null; }
  if (PB.sim) { PB.sim.stop(); PB.sim = null; }
  PB.frames = [];
  PB.positions = {};
  document.getElementById('pb-controls').style.display = 'none';
  document.getElementById('map-wrap').classList.remove('playback');
  const btn = document.getElementById('pb-play');
  btn.innerHTML = '&#9654;';
  btn.classList.remove('playing');
  mapRendered = false;
}

function togglePlayback() {
  if (!PB.active || !PB.frames.length) return;
  if (PB.playing) {
    pausePlayback();
  } else {
    // If at end, restart
    const duration = PB.sessionEnd - PB.sessionStart;
    if (PB.elapsed >= duration) {
      PB.elapsed = 0;
      PB.idx = 0;
      PB.positions = {};
      applyFrame(0, 0.6);
    }
    startPlayback();
  }
}

function startPlayback() {
  PB.playing = true;
  PB.lastTick = performance.now();
  const btn = document.getElementById('pb-play');
  btn.innerHTML = '&#9646;&#9646;';
  btn.classList.add('playing');
  PB.rafId = requestAnimationFrame(playbackLoop);
}

function pausePlayback() {
  PB.playing = false;
  if (PB.rafId) { cancelAnimationFrame(PB.rafId); PB.rafId = null; }
  const btn = document.getElementById('pb-play');
  btn.innerHTML = '&#9654;';
  btn.classList.remove('playing');
}

function playbackLoop(now) {
  if (!PB.playing) return;

  const dt = (now - PB.lastTick) / 1000;
  PB.lastTick = now;
  PB.elapsed += dt * PB.speed;

  const duration = PB.sessionEnd - PB.sessionStart;
  if (PB.elapsed >= duration) {
    PB.elapsed = duration;
    PB.playing = false;
    const btn = document.getElementById('pb-play');
    btn.innerHTML = '&#8634;';
    btn.classList.remove('playing');
    updatePbDisplay();
    return;
  }

  const newIdx = findFrameIndex(PB.sessionStart + PB.elapsed);
  if (newIdx !== PB.idx) {
    PB.idx = newIdx;
    applyFrame(newIdx, 0.15);
  }

  updatePbDisplay();
  PB.rafId = requestAnimationFrame(playbackLoop);
}

function findFrameIndex(targetTime) {
  const frames = PB.frames;
  let lo = 0, hi = frames.length - 1;
  while (lo < hi) {
    const mid = (lo + hi + 1) >> 1;
    if (frames[mid].created_at <= targetTime) lo = mid;
    else hi = mid - 1;
  }
  return lo;
}

function applyFrame(idx, alpha) {
  const frame = PB.frames[idx];
  const nodesDict = frame.graph.nodes || {};
  const rawEdges = frame.graph.edges || [];

  const activeNodes = Object.values(nodesDict)
    .filter(n => n.state === 'active');
  const activeIds = new Set(activeNodes.map(n => n.id));

  const prevIds = new Set(Object.keys(PB.positions));

  const nodes = activeNodes.map(n => {
    const pos = PB.positions[n.id];
    return {
      id: n.id, label: n.label, group: n.group,
      importance: n.importance || 0.5, pinned: n.pinned || false,
      color: pbColor(n.group),
      x: pos ? pos.x : PB.W/2 + (Math.random() - 0.5) * 200,
      y: pos ? pos.y : PB.H/2 + (Math.random() - 0.5) * 200,
      vx: pos ? pos.vx * 0.5 : 0,
      vy: pos ? pos.vy * 0.5 : 0,
    };
  });

  const edges = rawEdges
    .filter(e => activeIds.has(e.source) && activeIds.has(e.target))
    .map(e => ({ source: e.source, target: e.target, label: e.label || '' }));

  // D3 data join — Edges
  const eData = PB.gEdge.selectAll('.e-group')
    .data(edges, d => (d.source.id || d.source) + '->' + (d.target.id || d.target));
  eData.exit().transition().duration(300).style('opacity', 0).remove();
  const eEnter = eData.enter().append('g').attr('class','e-group').style('opacity', 0);
  eEnter.append('path').attr('class','edge-path');
  eEnter.append('text').attr('class','edge-text').text(d => d.label);
  eEnter.transition().duration(500).style('opacity', 1);
  eData.merge(eEnter).select('.edge-text').text(d => d.label);

  // D3 data join — Nodes
  const nData = PB.gNode.selectAll('.n-group').data(nodes, d => d.id);
  nData.exit().transition().duration(300)
    .style('opacity', 0).attr('transform', d => `translate(${d.x},${d.y}) scale(0)`).remove();

  const nEnter = nData.enter().append('g')
    .attr('class', d => 'n-group' + (d.pinned ? ' pinned' : ''))
    .style('opacity', d => prevIds.has(d.id) ? 1 : 0);
  nEnter.append('circle').attr('class','n-aura').attr('r',32).attr('fill',d=>d.color).attr('filter','url(#halo-pb)');
  nEnter.append('circle').attr('class','n-outer').attr('r',22).attr('stroke',d=>d.color);
  nEnter.append('circle').attr('class','n-inner').attr('r',18).attr('fill',d=>d.color);
  nEnter.append('circle').attr('class','n-dot').attr('r',4).attr('fill',d=>d.color).attr('filter','url(#glow-pb)');
  nEnter.append('text').attr('class','n-label').attr('dy',36).text(d=>d.label);
  nEnter.append('text').attr('class','n-cat').attr('dy',48).text(d=>d.group);
  nEnter.filter(d => !prevIds.has(d.id)).transition().duration(500).style('opacity', 1);

  const merged = nEnter.merge(nData);
  merged.select('.n-label').text(d => d.label);
  merged.select('.n-cat').text(d => d.group);
  merged.select('.n-outer').attr('stroke', d => d.color);
  merged.select('.n-inner').attr('fill', d => d.color);
  merged.select('.n-dot').attr('fill', d => d.color);
  merged.select('.n-aura').attr('fill', d => d.color);
  merged.classed('pinned', d => d.pinned);

  // Update simulation
  PB.sim.nodes(nodes);
  PB.sim.force('link').links(edges);
  PB.sim.alpha(alpha).restart();
}

function pbTick() {
  // Save positions
  PB.sim.nodes().forEach(n => {
    PB.positions[n.id] = { x: n.x, y: n.y, vx: n.vx, vy: n.vy };
  });

  // Update SVG
  PB.gEdge.selectAll('.edge-path').attr('d', d => {
    const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
    const dr = Math.sqrt(dx*dx + dy*dy) * 1.5;
    return `M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
  });
  PB.gEdge.selectAll('.edge-text')
    .attr('x', d => (d.source.x + d.target.x)/2 + (d.target.y - d.source.y)*0.06)
    .attr('y', d => (d.source.y + d.target.y)/2 - (d.target.x - d.source.x)*0.06);
  PB.gNode.selectAll('.n-group')
    .attr('transform', d => `translate(${d.x},${d.y})`);
}

function pbColor(group) {
  if (!PB.cmap[group]) PB.cmap[group] = COLORS[PB.ci++ % COLORS.length];
  return PB.cmap[group];
}

// ─── Playback UI ───
function updatePbDisplay() {
  const duration = PB.sessionEnd - PB.sessionStart;
  const pct = duration > 0 ? (PB.elapsed / duration) * 100 : 0;

  document.getElementById('pb-fill').style.width = pct + '%';
  document.getElementById('pb-handle').style.left = pct + '%';
  document.getElementById('pb-time').textContent = fmtTime(PB.elapsed) + ' / ' + fmtTime(duration);
  document.getElementById('pb-frame').textContent = (PB.idx + 1) + ' / ' + PB.frames.length;
}

function toggleGraphFullscreen() {
  const panel = document.getElementById('tab-mindmap');
  panel.classList.toggle('fullscreen');
  // Trigger resize so D3 recalculates
  window.dispatchEvent(new Event('resize'));
  if (PB.sim) PB.sim.alpha(0.3).restart();
}

// Exit fullscreen on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const panel = document.getElementById('tab-mindmap');
    if (panel.classList.contains('fullscreen')) {
      panel.classList.remove('fullscreen');
      window.dispatchEvent(new Event('resize'));
      if (PB.sim) PB.sim.alpha(0.3).restart();
    }
  }
});

function cycleSpeed() {
  PB.speedIdx = (PB.speedIdx + 1) % SPEEDS.length;
  PB.speed = SPEEDS[PB.speedIdx];
  document.getElementById('pb-speed').textContent = PB.speed + 'x';
}

function setupScrubber() {
  const track = document.getElementById('pb-track');
  let dragging = false;
  let wasPlaying = false;

  function scrubTo(e) {
    const rect = track.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    const duration = PB.sessionEnd - PB.sessionStart;
    PB.elapsed = pct * duration;

    const newIdx = findFrameIndex(PB.sessionStart + PB.elapsed);
    const bigJump = Math.abs(newIdx - PB.idx) > 5;
    if (bigJump) PB.positions = {};
    if (newIdx !== PB.idx) {
      PB.idx = newIdx;
      applyFrame(newIdx, bigJump ? 0.6 : 0.15);
    }
    updatePbDisplay();
  }

  track.addEventListener('mousedown', e => {
    dragging = true;
    wasPlaying = PB.playing;
    if (PB.playing) pausePlayback();
    scrubTo(e);
  });

  document.addEventListener('mousemove', e => {
    if (dragging) scrubTo(e);
  });

  document.addEventListener('mouseup', () => {
    if (dragging) {
      dragging = false;
      if (wasPlaying) startPlayback();
    }
  });
}

// ─── Export ───
function buildMarkdown() {
  const s = current.session;
  let md = `# Session Recap: ${s.topic || s.id}\n`;
  md += `**Date:** ${fmtDate(s.created_at)}  \n`;
  md += `**Duration:** ${s.ended_at ? fmtDuration(s.ended_at - s.created_at) : 'In progress'}  \n`;
  md += `**Segments:** ${s.segment_count || 0}\n\n`;

  if (current.recap) {
    const r = current.recap.recap;
    if (r.schema_version === 2) {
      // V2 recap
      if (r.elevator_pitch) { md += `## Elevator Pitch\n\n${r.elevator_pitch}\n\n`; }
      if (r.retain && r.retain.length) {
        md += `## Three Things to Retain\n\n`;
        r.retain.forEach((item, i) => { md += `${i + 1}. ${item}\n`; });
        md += `\n`;
      }
      md += `## Non-Obvious Connections\n\n`;
      if (r.non_obvious_connections && r.non_obvious_connections.length) {
        r.non_obvious_connections.forEach(conn => {
          md += `**${(conn.topics || []).join(' \u2194 ')}:** ${conn.insight}\n\n`;
        });
      } else {
        md += `_No non-obvious connections surfaced this session._\n\n`;
      }
      if (r.contradictions && r.contradictions.length) {
        md += `## Contradictions\n\n`;
        r.contradictions.forEach(c => { md += `- ${c}\n`; });
        md += `\n`;
      }
      if (r.summary) { md += `## Summary\n\n${r.summary}\n\n`; }
      if (r.decisions && r.decisions.length) {
        md += `## Decisions\n\n`;
        r.decisions.forEach(d => { md += `- ${d}\n`; });
        md += `\n`;
      }
      if (r.open_threads && r.open_threads.length) {
        md += `## Open Threads\n\n`;
        r.open_threads.forEach(t => { md += `- ${t}\n`; });
        md += `\n`;
      }
    } else {
      // V1 recap
      if (r.summary) { md += `## Summary\n\n${r.summary}\n\n`; }
      if (r.key_topics && r.key_topics.length) {
        md += `## Key Topics\n\n`;
        r.key_topics.forEach(t => { md += `- ${t}\n`; });
        md += `\n`;
      }
      if (r.decisions && r.decisions.length) {
        md += `## Decisions\n\n`;
        r.decisions.forEach(d => { md += `- ${d}\n`; });
        md += `\n`;
      }
      if (r.action_items && r.action_items.length) {
        md += `## Action Items\n\n`;
        r.action_items.forEach(a => { md += `- ${a}\n`; });
        md += `\n`;
      }
      if (r.open_questions && r.open_questions.length) {
        md += `## Open Questions\n\n`;
        r.open_questions.forEach(q => { md += `- ${q}\n`; });
        md += `\n`;
      }
    }
  }

  const model = current.recap?.model || '';
  const lang = current.recap?.recap?.language || '';
  md += `---\n\n_Generated by Mímir${model ? ' · Model: ' + model : ''}${lang ? ' · Language: ' + lang.toUpperCase() : ''}_\n`;

  return md;
}

// ─── Graph Export (PDF / Video) ───

async function exportGraph(fmt) {
  if (!current) return;
  const sid = current.session.id;
  const btn = event.target;
  const origText = btn.textContent;

  btn.classList.add('exporting');
  const fmtLabels = {pdf: 'Generating PDF...', video: 'Rendering video...', slides: 'Generating slides...'};
  btn.textContent = fmtLabels[fmt] || `Exporting ${fmt}...`;
  toast(`Starting ${fmt.toUpperCase()} export...`);

  try {
    // Start export
    const startResp = await fetch(`/v1/sessions/${sid}/export/${fmt}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(fmt === 'video' ? {fps: 10, speed: 2.0, max_hold: 3.0} : {}),
    });
    const startData = await startResp.json();
    if (startData.status === 'error') throw new Error(startData.error);

    // Poll for completion
    let status = 'running';
    while (status === 'running' || status === 'started') {
      await new Promise(r => setTimeout(r, 2000));
      const pollResp = await fetch(`/v1/sessions/${sid}/export/${fmt}/status`);
      const pollData = await pollResp.json();
      status = pollData.status;
      if (status === 'error') throw new Error(pollData.error || 'Export failed');
    }

    // Download
    if (status === 'done') {
      const a = document.createElement('a');
      a.href = `/v1/sessions/${sid}/export/${fmt}/download`;
      const fmtExt = {pdf: 'pdf', video: 'mp4', slides: 'html'};
      a.download = `mimir-${sid}.${fmtExt[fmt] || fmt}`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      toast(`${fmt.toUpperCase()} exported`);
    }
  } catch (e) {
    console.error('Export failed:', e);
    toast(`Export failed: ${e.message}`, true);
  } finally {
    btn.classList.remove('exporting');
    btn.textContent = origText;
  }
}

function buildTranscriptMarkdown() {
  const s = current.session;
  if (!current.transcript || !current.transcript.length) return '';
  const t0 = current.transcript[0].timestamp;
  const showRaw = document.getElementById('toggle-raw')?.checked || false;
  const hasCleaned = current.transcript.some(seg => seg.cleaned_text);
  const cleanedNote = (!showRaw && hasCleaned) ? ' (cleaned)' : '';

  let md = `# Transcript: ${s.topic || s.id}${cleanedNote}\n`;
  md += `**Date:** ${fmtDate(s.created_at)}  \n`;
  md += `**Duration:** ${s.ended_at ? fmtDuration(s.ended_at - s.created_at) : 'In progress'}  \n`;
  md += `**Segments:** ${current.transcript.length}\n\n---\n\n`;

  current.transcript.forEach(seg => {
    const text = (!showRaw && seg.cleaned_text) ? seg.cleaned_text : seg.text;
    const langTag = seg.stt_language ? ` \`${seg.stt_language}\`` : '';
    md += `**[${fmtTime(seg.timestamp - t0)}]**${langTag} ${text}\n\n`;
  });

  md += `---\n\n_Generated by Mímir_\n`;
  return md;
}

function copyTranscriptMarkdown() {
  const md = buildTranscriptMarkdown();
  if (!md) { toast('No transcript to copy', true); return; }
  navigator.clipboard.writeText(md).then(
    () => toast('Transcript copied to clipboard'),
    () => toast('Failed to copy', true)
  );
}

}

// ─── Helpers ───
function fmtDate(ts) {
  return new Date(ts * 1000).toLocaleString('en-US', {
    year: 'numeric', month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit',
  });
}

function fmtDuration(secs) {
  if (secs < 60) return `${Math.round(secs)}s`;
  if (secs < 3600) return `${Math.floor(secs / 60)}m ${Math.round(secs % 60)}s`;
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  return `${h}h ${m}m`;
}

function fmtTime(secs) {
  const m = Math.floor(Math.abs(secs) / 60);
  const s = Math.floor(Math.abs(secs) % 60);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function esc(str) {
  const el = document.createElement('span');
  el.textContent = str;
  return el.innerHTML;
}

function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.toggle('error', !!isError);
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
